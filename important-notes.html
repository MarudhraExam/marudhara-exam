<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Notes | मरुधरा एग्जाम</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:48px;
margin:20px 0 30px;
}

.subject-grid{
display:block;
max-width:800px;
margin:auto;
}

.subject-card{
background:#fff;
padding:12px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
}

.subject-inner{
border:2px solid #222;
border-radius:20px;
height:120px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.subject-title{
font-size:26px;
font-weight:bold;
}

.subject-icon{
font-size:40px;
margin:15px 0;
}

.subject-hindi{
font-size:18px;
font-weight:bold;
}

.topic-box{
background:#fff;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.open-btn{
display:inline-block;
padding:8px 15px;
background:#003366;
color:#fff;
text-decoration:none;
border-radius:6px;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<h1>📚 Important Notes</h1>

<div id="notesContainer"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "....",
  authDomain: "....",
  projectId: "marudhara-exam",
  storageBucket: "....",
  messagingSenderId: "....",
  appId: "...."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.toggleFolder = function(id){
document.getElementById(id)
.classList.toggle("hidden");
}
async function loadNotes(){

const snapshot = await getDocs(
collection(db,"notesPdfs")
);

let grouped = {};

snapshot.forEach(doc=>{

const note = doc.data();

if(!grouped[note.categoryName]){
grouped[note.categoryName] = {};
}

if(!grouped[note.categoryName][note.subjectName]){
grouped[note.categoryName][note.subjectName] = {};
}

if(!grouped[note.categoryName][note.subjectName][note.topicName]){
grouped[note.categoryName][note.subjectName][note.topicName] = [];
}

grouped[note.categoryName][note.subjectName][note.topicName].push(note);

});

let html = "";

html += `<div class="subject-grid">`;

for(const category in grouped){

html += `
<div class="subject-card" onclick="toggleFolder('cat-${category}')">
    <div class="subject-inner">
        <div class="subject-title">${category}</div>
        <div class="subject-icon">📚</div>
<div class="subject-hindi">Click to Open</div>    </div>
</div>

<div id="cat-${category}" class="hidden"
style="
margin-top:10px;
padding:10px;
background:#f9f9f9;
border-radius:10px;
">
`;

for(const subject in grouped[category]){

for(const topic in grouped[category][subject]){

grouped[category][subject][topic].forEach(note=>{

html += `
<div class="topic-box">

<b>📄 ${note.noteTitle}</b>

<br><br>

<a href="${note.pdfLink}"
target="_blank"
class="open-btn">
Open PDF
</a>

</div>
`;

});

}

}

html += `</div>`;

}

html += `</div>`;
document.getElementById("notesContainer").innerHTML = html;

}
loadNotes();
</script>
</body>
</html>
