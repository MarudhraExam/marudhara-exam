<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result - मरुधरा एग्जाम</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}

.card{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
}

.score{
    text-align:center;
    font-size:55px;
    color:#FF8C00;
    margin:20px 0;
    font-weight:bold;
}

.status{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    margin:20px 0;
}

.pass{
    color:green;
}

.fail{
    color:red;
}

.info{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin:12px 0;
}

hr{
    margin:20px 0;
}

.btn{
    display:block;
    text-align:center;
    padding:15px;
    background:#002B5B;
    color:white;
    text-decoration:none;
    border-radius:10px;
    margin-top:25px;
}

.reason{
    background:#fff3cd;
    padding:12px;
    border-radius:10px;
    margin-top:15px;
    font-weight:bold;
}
#analysisTable{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

#analysisTable th,
#analysisTable td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

#analysisTable th{
    background:#002B5B;
    color:white;
}

.correctRow{
    background:#e8ffe8;
}

.wrongRow{
    background:#ffe8e8;
}

.skipRow{
    background:#fff8d6;
}
</style>

</head>

<body>

<div class="card">

<h1>📊 मरुधरा एग्जाम परिणाम</h1>

<div
class="score"
id="score">
0%
</div>

<div
class="status"
id="status">
</div>

<div
class="reason"
id="reason"
style="display:none">
</div>

<div class="info">

<p>
<b>परीक्षा :</b>
<span id="examName"></span>
</p>

<p>
<b>पेपर कोड :</b>
<span id="paperCode"></span>
</p>

<p>
<b>नाम :</b>
<span id="name"></span>
</p>

<p>
<b>रोल नंबर :</b>
<span id="roll"></span>
</p>

</div>

<hr>

<p>
<b>कुल प्रश्न :</b>
<span id="totalQuestions"></span>
</p>

<p>
<b>✅ सही :</b>
<span id="correct"></span>
</p>

<p>
<b>❌ गलत :</b>
<span id="wrong"></span>
</p>

<p>
<b>🟡 E Option :</b>
<span id="eCount"></span>
</p>

<p>
<b>⚪ Blank :</b>
<span id="blank"></span>
</p>

<hr>

<p>
<b>कुल अंक :</b>
<span id="totalMarks"></span>
</p>

<p>
<b>प्राप्त अंक :</b>
<span id="obtainedMarks"></span>
</p>

<hr>

<h2>📈 प्रदर्शन विश्लेषण</h2>

<p>
<b>Accuracy :</b>
<span id="accuracy"></span>
</p>

<p>
<b>Attempted :</b>
<span id="attemptedPercent"></span>
</p>

<p>
<b>Not Attempted :</b>
<span id="notAttemptedPercent"></span>
</p>
<span id="obtainedMarks"></span>
</p>
<button onclick="downloadPDF()" class="btn">
📄 Download Score Card
</button>
<a href="index.html" class="btn">
🏠 Home Page
</a>

</div>
<hr>

<h2>📋 प्रश्नवार विश्लेषण</h2>

<table id="analysisTable">

<thead>
<tr>
<th>प्रश्न</th>
<th>आपका उत्तर</th>
<th>सही उत्तर</th>
<th>स्थिति</th>
</tr>
</thead>

<tbody id="analysisBody"></tbody>

</table>
<script type="module">
import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";    
const firebaseConfig = {
apiKey: "AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain: "marudhara-exam.firebaseapp.com",
projectId: "marudhara-exam",
storageBucket: "marudhara-exam.firebasestorage.app",
messagingSenderId: "680152404373",
appId: "1:680152404373:web:23515d1d06c44dbd33669c"
};
const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);
const correct =
parseInt(localStorage.getItem("correct")) || 0;

const wrong =
parseInt(localStorage.getItem("wrong")) || 0;

const eCount =
parseInt(localStorage.getItem("eCount")) || 0;

const blank =
parseInt(localStorage.getItem("blank")) || 0;

const totalQuestions =
parseInt(localStorage.getItem("totalQuestions")) || 0;

const correctMarks =
parseFloat(localStorage.getItem("correctMarks")) || 2;

const negativeMarks =
parseFloat(localStorage.getItem("negativeMarks")) || 0;

const passPercentage =
parseFloat(localStorage.getItem("passPercentage")) || 40;

const deletedQuestionsText =
localStorage.getItem("deletedQuestions") || "";

const deletedArray =
deletedQuestionsText
.split(",")
.filter(x => x.trim() !== "");

const deletedCount =
deletedArray.length;

const deletedMarks =
deletedCount * correctMarks;

const validQuestions =
totalQuestions - deletedCount;

let extraPerQuestion = 0;

if(validQuestions > 0){

extraPerQuestion =
deletedMarks / validQuestions;

}

const finalQuestionValue =
correctMarks + extraPerQuestion;

let obtainedMarks =

(correct * finalQuestionValue)

-

(wrong * negativeMarks);

if(obtainedMarks < 0){

obtainedMarks = 0;

}

const totalMarks =
validQuestions *
finalQuestionValue;

let percentage = 0;

if(totalMarks > 0){

percentage =
(
(obtainedMarks / totalMarks)
* 100
).toFixed(2);

}
const resultData = {
name: localStorage.getItem("studentName") || "",
rollNo: localStorage.getItem("rollNo") || "",
gender: localStorage.getItem("gender") || "",
category: localStorage.getItem("category") || "",
tspType: localStorage.getItem("tspType") || "",

examName: localStorage.getItem("examName") || "",
paperCode: localStorage.getItem("paperCode") || "",

correct: correct,
wrong: wrong,
eCount: eCount,
blank: blank,

obtainedMarks: Number(obtainedMarks.toFixed(2)),
percentage: Number(percentage),

createdAt: Date.now()
};
document.getElementById(
"score"
).innerText =
percentage + "%";

document.getElementById(
"examName"
).innerText =
localStorage.getItem(
"examName"
) || "-";

document.getElementById(
"paperCode"
).innerText =
localStorage.getItem(
"paperCode"
) || "-";

document.getElementById(
"name"
).innerText =
localStorage.getItem(
"studentName"
) || "-";

document.getElementById(
"roll"
).innerText =
localStorage.getItem(
"rollNo"
) || "-";

document.getElementById(
"correct"
).innerText =
correct;

document.getElementById(
"wrong"
).innerText =
wrong;

document.getElementById(
"eCount"
).innerText =
eCount;

document.getElementById(
"blank"
).innerText =
blank;

document.getElementById(
"totalQuestions"
).innerText =
totalQuestions;

document.getElementById(
"totalMarks"
).innerText =
totalMarks.toFixed(2);

document.getElementById(
"obtainedMarks"
).innerText =
obtainedMarks.toFixed(2);
const attempted =
correct + wrong;

let accuracy = 0;

if(attempted > 0){
    accuracy =
    ((correct / attempted) * 100)
    .toFixed(2);
}

const attemptedPercent =
(
(attempted / totalQuestions)
* 100
).toFixed(2);

const notAttemptedPercent =
(
((eCount + blank) / totalQuestions)
* 100
).toFixed(2);

document.getElementById(
"accuracy"
).innerText =
accuracy + "%";

document.getElementById(
"attemptedPercent"
).innerText =
attemptedPercent + "%";

document.getElementById(
"notAttemptedPercent"
).innerText =
notAttemptedPercent + "%";
const status =
document.getElementById(
"status"
);

const reason =
document.getElementById(
"reason"
);

if(
percentage >= passPercentage
){

status.innerHTML =
'<span class="pass">✅ PASS</span>';

}
else{

status.innerHTML =
'<span class="fail">❌ FAIL</span>';

reason.style.display =
"block";

reason.innerText =
"न्यूनतम उत्तीर्ण प्रतिशत प्राप्त नहीं हुआ";

}
function downloadPDF(){

window.print();
}
const analysisData =
JSON.parse(
localStorage.getItem("questionAnalysis")
) || [];

const tbody =
document.getElementById("analysisBody");

analysisData.forEach(item=>{

let icon = "";
let rowClass = "";

if(item.status==="Correct"){
    icon = "✅";
    rowClass = "correctRow";
}
else if(item.status==="Wrong"){
    icon = "❌";
    rowClass = "wrongRow";
}
else{
    icon = "🟡";
    rowClass = "skipRow";
}

tbody.innerHTML += `
<tr class="${rowClass}">
<td>${item.question}</td>
<td>${item.studentAnswer}</td>
<td>${item.correctAnswer}</td>
<td>${icon}</td>
</tr>
`;

});
</script>

</body>
</html>
