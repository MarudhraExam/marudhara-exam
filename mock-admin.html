<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test Manager</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#002B5B;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:12px 20px;
background:#002B5B;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#004080;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Mock Test Manager</h1>

<div class="card">

<h2>➕ Create Category</h2>

<input
type="text"
id="categoryName"
placeholder="Category Name">

<input
type="text"
id="categoryIcon"
placeholder="Category Icon URL">

<input
type="number"
id="categoryOrder"
placeholder="Display Order">

<button id="saveCategoryBtn">
Save Category
</button>

</div>

<div class="card">

<h2>📂 Category List</h2>

<div id="categoryList">

Loading...

</div>

</div>

</div>

</body>
</html>
