<!DOCTYPE html>
<html lang="hi">
<head>

header{

    padding:15px;
}

.container{
    max-width:1000px;
    margin:20px auto;
    padding:20px;
}

    color:#666;

.buttons{
    margin-top:15px;

.buttons a{
    text-decoration:none;
    padding:10px 15px;
    border-radius:6px;
    margin-right:10px;
    display:inline-block;
    font-weight:bold;
}

.view-btn{
    background:#002B5B;

.download-btn{

    </p>

    <div class="buttons">
