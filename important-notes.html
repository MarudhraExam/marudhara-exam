<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Notes | मरुधरा एग्जाम</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:48px;
margin:20px 0 30px;
}

.subject-grid{
display:block;
max-width:800px;
margin:auto;
}

.subject-card{
background:#fff;
padding:12px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
margin-bottom:10px;
}

.subject-inner{
border:2px solid #222;
border-radius:20px;
height:120px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.subject-title{
font-size:26px;
font-weight:bold;
}

.subject-icon{
font-size:40px;
margin:15px 0;
}

.subject-hindi{
font-size:18px;
font-weight:bold;
}

.topic-box{
background:#fff;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.open-btn{
display:inline-block;
padding:8px 15px;
background:#003366;
color:#fff;
text-decoration:none;
border-radius:6px;
}

.hidden{
display:none;
}
.folder{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.folder-content{
margin-left:20px;
}

.subject-folder{
background:#eef5ff;
}

.topic-folder{
background:#f5f5f5;
}

.pdf-box{
background:white;
padding:10px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}
</style>
</head>

<body>

<h1>📚 Important Notes</h1>

<div id="notesContainer"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "....",
  authDomain: "....",
  projectId: "marudhara-exam",
  storageBucket: "....",
  messagingSenderId: "....",
  appId: "...."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.toggleFolder = function(id){
document.getElementById(id)
.classList.toggle("hidden");
}
async function loadNotes(){

const categoriesSnap = await getDocs(collection(db,"notesCategories"));
const subjectsSnap = await getDocs(collection(db,"notesSubjects"));
const topicsSnap = await getDocs(collection(db,"notesTopics"));
const pdfsSnap = await getDocs(collection(db,"notesPdfs"));

let categories = {};
let subjects = {};
let topics = {};

categoriesSnap.forEach(doc=>{
    categories[doc.id] = doc.data();
});

subjectsSnap.forEach(doc=>{
    subjects[doc.id] = doc.data();
});

topicsSnap.forEach(doc=>{
    topics[doc.id] = doc.data();
});

let html = "";

for(const categoryId in categories){

const category = categories[categoryId];

html += `
<div class="folder category-folder">
📁 ${category.name}
</div>

<div class="folder-content hidden" id="cat-${categoryId}">
`;

for(const subjectId in subjects){

const subject = subjects[subjectId];

if(subject.categoryId !== categoryId) continue;

html += `
<div class="folder subject-folder"
onclick="toggleFolder('sub-${subjectId}')">
📁 ${subject.subjectName}
</div>

<div class="folder-content hidden"
id="sub-${subjectId}">
`;

for(const topicId in topics){

const topic = topics[topicId];

if(topic.subjectId !== subjectId) continue;

html += `
<div class="folder topic-folder"
onclick="toggleFolder('topic-${topicId}')">
📁 ${topic.topicName}
</div>

<div class="folder-content hidden"
id="topic-${topicId}">
`;

pdfsSnap.forEach(pdfDoc=>{

const pdf = pdfDoc.data();

if(pdf.topicId !== topicId) return;

html += `
<div class="pdf-box">

📄 ${pdf.noteTitle}

<br><br>

<a href="${pdf.pdfLink}"
target="_blank"
class="open-btn">
Open PDF
</a>

</div>
`;

});

html += `</div>`;
}

html += `</div>`;
}

html += `</div>`;
}

document.getElementById("notesContainer").innerHTML = html;

}
</script>
</body>
</html>
