<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Exam Result</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f4f7fb; color: #1f324f; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#f8fbff 0%,#edf2f8 100%); }
    body, button { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .page-shell { max-width: 1100px; margin: 0 auto; padding: 24px 18px 32px; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 24px; }
    .brand { display: flex; gap: 14px; align-items: center; }
    .brand .logo { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 18px; background: #0b4ea2; color: #fff; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 1.9rem; }
    .brand small { display: block; color: #5f6f8f; margin-top: 2px; }
    .top-actions a { border-radius: 999px; padding: 12px 18px; background: #0b4ea2; color: #fff; }
    .top-actions a:hover { background: #0f3c7f; }
    .language-select { font-size: 1rem; padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(35,49,79,.2); background: #fff; color: #102a52; }
    .status-bar { margin-bottom: 24px; padding: 14px 18px; border-radius: 18px; background: #eef4ff; color: #102a52; font-weight: 600; }
    .status-bar.error { background: #ffe7e6; color: #8a1f19; }
    .result-grid { display: grid; gap: 20px; }
    .card-grid { display: grid; gap: 20px; grid-template-columns: minmax(0,1.2fr) 360px; }
    .card { background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 24px; padding: 24px; }
    .card h2 { margin-top: 0; }
    .summary-block { display: grid; gap: 14px; margin-top: 18px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 18px; background: #f5f8ff; }
    .summary-row strong { font-size: 0.98rem; }
    .summary-large { font-size: 3rem; line-height: 1; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: #eef4ff; color: #0b4ea2; font-weight: 700; }
    .details-list { display: grid; gap: 12px; margin-top: 18px; }
    .details-item { display: flex; justify-content: space-between; gap: 12px; padding: 14px 16px; border-radius: 18px; background: #fbfbfb; }
    .details-item strong { color: #102a52; }
    .neutral-note { margin: 0; padding: 16px 18px; border-radius: 18px; background: #eef4ff; color: #0b4ea2; }
    .empty-state { padding: 32px 24px; border-radius: 24px; background: #fff; border: 1px dashed rgba(35,49,79,.15); color: #556180; text-align: center; }
    .action-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    .button-primary, .button-secondary { border: 0; border-radius: 14px; padding: 12px 18px; cursor: pointer; transition: background .2s ease, color .2s ease; }
    .button-primary { background: #0b4ea2; color: #fff; }
    .button-secondary { background: #eef2ff; color: #0b4ea2; }
    .button-primary:hover { background: #0f3c7f; }
    .button-secondary:hover { background: #dce6ff; }
    .button-secondary.active { background: #0b4ea2; color: #fff; }
    .review-section { padding-bottom: 0; }
    .review-top { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: center; }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .review-list { display: grid; gap: 18px; margin-top: 20px; }
    .review-card { border: 1px solid rgba(35,49,79,.12); border-radius: 24px; padding: 22px; background: #fff; scroll-margin-top: 96px; }
    .review-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: flex-start; }
    .question-meta { color: #5f6f8f; font-size: 0.92rem; margin-bottom: 8px; }
    .question-text { color: #162e56; font-weight: 700; line-height: 1.55; white-space: pre-line; }
    .status-badge { padding: 9px 16px; border-radius: 999px; font-weight: 700; text-transform: uppercase; letter-spacing: .02em; font-size: .82rem; white-space: nowrap; }
    .status-correct { background: #e6f8eb; color: #077a37; }
    .status-wrong { background: #ffe7e7; color: #961f1f; }
    .status-unattempted { background: #eef2ff; color: #0b4ea2; }
    .question-image { width: 100%; max-height: 320px; object-fit: contain; border-radius: 18px; margin: 20px 0; }
    .options-grid { display: grid; gap: 12px; margin-top: 18px; }
    .option-chip { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 16px; background: #f8f9fd; border: 1px solid rgba(35,49,79,.08); color: #1b2d4f; }
    .option-label { min-width: 36px; min-height: 36px; display: grid; place-items: center; border-radius: 999px; background: #dbe6ff; color: #0b4ea2; font-weight: 700; }
    .option-correct { background: #ecf9f1; border-color: #80d7a7; }
    .option-selected-correct { background: #d8efff; border-color: #80c1ff; }
    .option-selected-wrong { background: #ffe9e9; border-color: #ff9a9a; }
    .option-unattempted { background: #f4f5f8; border-color: #ccd4e3; color: #6d7586; }
    .answer-summary { display: grid; gap: 10px; margin-top: 24px; padding: 18px; border-radius: 18px; background: #f8faff; border: 1px solid rgba(11,78,162,.1); }
    .answer-summary div { display: flex; justify-content: space-between; gap: 12px; }
    .answer-summary strong { color: #102a52; }
    .card-grid + .review-section { margin-top: 20px; }
    @media (max-width: 920px) { .card-grid { grid-template-columns: 1fr; } }
    @media (min-width: 680px) { .options-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Exam result</h1>
          <small>Review your performance and return to practice more mock tests.</small>
        </div>
      </div>
      <div class="top-actions">
        <select id="languageSelect" class="language-select" aria-label="Select language">
          <option value="hi">हिन्दी</option>
          <option value="en">English</option>
        </select>
        <a href="index.html">Back to categories</a>
      </div>
    </header>

    <div id="statusBar" class="status-bar">Loading result summary…</div>
    <div id="resultContent" class="result-grid"></div>
  </div>

  <script type="module">
    import { db } from '../firebase.js';
    import {
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where,
      orderBy
    } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

    const statusBar = document.getElementById('statusBar');
    const resultContent = document.getElementById('resultContent');
    const languageSelect = document.getElementById('languageSelect');
    const languageKey = 'mockExamLanguage';

    function setStatus(message, type = 'info') {
      statusBar.textContent = message;
      statusBar.className = type === 'error' ? 'status-bar error' : 'status-bar';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatSeconds(seconds) {
      if (seconds == null || Number.isNaN(seconds)) return 'N/A';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}m ${secs}s`;
    }

    function getSavedLanguage() {
      const stored = localStorage.getItem(languageKey);
      return stored === 'en' ? 'en' : 'hi';
    }

    function saveLanguage(lang) {
      localStorage.setItem(languageKey, lang === 'en' ? 'en' : 'hi');
    }

    function getLocalizedField(question, fieldBase) {
      const lang = getSavedLanguage();
      const english = String(question[`${fieldBase}English`] || '').trim();
      const hindi = String(question[`${fieldBase}Hindi`] || '').trim();
      const fallback = String(question[fieldBase] || '').trim();
      if (lang === 'en') {
        return english || hindi || fallback;
      }
      return hindi || fallback || english;
    }

    function normalizeAnswer(value) {
      return String(value || '').trim().toUpperCase();
    }

    function formatQuestionText(raw) {
      return String(raw || '')
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\r\n/g, '\n');
    }

    async function fetchCategoryName(categoryId) {
      if (!categoryId) return 'Unknown Category';
      try {
        const categoryDoc = await getDoc(doc(db, 'mockCategories', categoryId));
        if (!categoryDoc.exists()) return 'Unknown Category';
        const category = categoryDoc.data();
        return category?.name || category?.title || 'Unknown Category';
      } catch (error) {
        console.error('Category lookup failed:', error);
        return 'Unknown Category';
      }
    }

    function renderSummary(result, categoryName) {
      const studentName = result.name || result.studentName || 'Unknown';
      const studentRoll = result.roll || result.studentRoll || 'Unknown';
      const mockTitle = result.mockTitle || 'Mock exam';
      const score = result.score ?? 0;
      const correct = result.correct ?? 0;
      const wrong = result.wrong ?? 0;
      const attempted = result.attempted ?? 0;
      const unattempted = result.unattempted ?? 0;
      const totalQuestions = result.totalQuestions ?? (Array.isArray(result.questions) ? result.questions.length : undefined) ?? result.questionCount ?? 0;
      const totalMarks = (result.positiveMarks || 1) * totalQuestions;
      const percentage = totalMarks > 0 ? ((score / totalMarks) * 100).toFixed(2) : '0.00';
      const timeTaken = formatSeconds(result.timeTakenSeconds ?? result.timeTaken);
      const remainingTime = formatSeconds(result.timeRemainingSeconds ?? result.remainingTime);
      const submittedAt = result.submittedAt ? new Date(result.submittedAt).toLocaleString() : 'N/A';

      return `
        <div class="card">
          <h2>${escapeHtml(mockTitle)}</h2>
          <p class="neutral-note">${escapeHtml(studentName)} · Roll No: ${escapeHtml(studentRoll)}</p>
          <div class="summary-block">
            <div class="summary-row"><strong>Score</strong><span class="summary-large">${score}</span></div>
            <div class="summary-row"><strong>Percentage</strong><span>${percentage}%</span></div>
            <div class="summary-row"><strong>Correct</strong><span>${correct}</span></div>
            <div class="summary-row"><strong>Wrong</strong><span>${wrong}</span></div>
            <div class="summary-row"><strong>Attempted</strong><span>${attempted}</span></div>
            <div class="summary-row"><strong>Unattempted</strong><span>${unattempted}</span></div>
            <div class="summary-row"><strong>Questions</strong><span>${totalQuestions}</span></div>
            <div class="summary-row"><strong>Time taken</strong><span>${escapeHtml(timeTaken)}</span></div>
            <div class="summary-row"><strong>Remaining time</strong><span>${escapeHtml(remainingTime)}</span></div>
            <div class="summary-row"><strong>Submitted on</strong><span>${escapeHtml(submittedAt)}</span></div>
          </div>
          <div class="action-row">
            <button class="button-primary" type="button" onclick="window.location.href='index.html'">Return to categories</button>
            <button class="button-secondary" type="button" onclick="window.print()">Print result</button>
          </div>
        </div>
        <div class="card">
          <h2>Details</h2>
          <div class="details-list">
            <div class="details-item"><strong>Mock title</strong><span>${escapeHtml(mockTitle)}</span></div>
            <div class="details-item"><strong>Category</strong><span>${escapeHtml(categoryName)}</span></div>
            <div class="details-item"><strong>Name</strong><span>${escapeHtml(studentName)}</span></div>
            <div class="details-item"><strong>Roll number</strong><span>${escapeHtml(studentRoll)}</span></div>
          </div>
        </div>`;
    }

    async function fetchQuestions(mockId) {
      if (!mockId) return [];
      const questionsRef = collection(db, 'mockQuestions');
      const questionsQuery = query(questionsRef, where('mockId', '==', mockId), orderBy('questionNo', 'asc'));
      const querySnapshot = await getDocs(questionsQuery);
      

console.log("Searching Mock ID:", mockId);
console.log("Documents Found:", querySnapshot.size);

const items = [];
      querySnapshot.forEach((docSnapshot) => {
        console.log("Question Doc:", docSnapshot.id, docSnapshot.data());
        const data = docSnapshot.data();
        items.push({
          id: docSnapshot.id,
          question: data.question || '',
          questionHindi: data.questionHindi || data.question || '',
          questionEnglish: data.questionEnglish || '',
          optionA: data.optionA || '',
          optionAHindi: data.optionAHindi || data.optionA || '',
          optionAEnglish: data.optionAEnglish || '',
          optionB: data.optionB || '',
          optionBHindi: data.optionBHindi || data.optionB || '',
          optionBEnglish: data.optionBEnglish || '',
          optionC: data.optionC || '',
          optionCHindi: data.optionCHindi || data.optionC || '',
          optionCEnglish: data.optionCEnglish || '',
          optionD: data.optionD || '',
          optionDHindi: data.optionDHindi || data.optionD || '',
          optionDEnglish: data.optionDEnglish || '',
          optionE: data.optionE || '',
          optionEHindi: data.optionEHindi || data.optionE || '',
          optionEEnglish: data.optionEEnglish || '',
          answer: data.answer || data.correctAnswer || data.correctOption || '',
          explanation: data.explanation || '',
          image: data.image || '',
          questionNo: data.questionNo ?? 0,
          mockId: data.mockId || mockId
        });
      });
      return items;
    }

    function buildOptionHtml(letter, optionText, status) {
      const text = optionText ? escapeHtml(optionText) : '—';
      const classes = ['option-chip'];
      if (status === 'correct') classes.push('option-correct');
      if (status === 'selected-correct') classes.push('option-selected-correct');
      if (status === 'selected-wrong') classes.push('option-selected-wrong');
      if (status === 'unattempted') classes.push('option-unattempted');

      return `
        <div class="${classes.join(' ')}">
          <span class="option-label">${letter}</span>
          <span>${text}</span>
        </div>`;
    }

    function renderReviewCards(questions, answers) {
      if (!questions.length) {
        return '<div class="empty-state">No questions were found for this mock test.</div>';
      }

      if (!questions.length) {
        console.log('Questions Loaded:', questions.length);
        console.log('Result Answers:', answers);
      }

      return questions
        .map((question, index) => {
          console.log(question);
          console.log("Question ID:", question.id);
console.log("Correct:", question.answer);
console.log("Student:", answers?.[question.id]);
console.log("Answers Object:", answers);
          const studentAnswer = normalizeAnswer(answers?.[question.id] ?? '');
          const correctAnswer = normalizeAnswer(question.answer || '');
          const status = !studentAnswer ? 'Unattempted' : studentAnswer === correctAnswer ? 'Correct' : 'Wrong';
          const options = ['A', 'B', 'C', 'D', 'E']
            .map((letter) => {
              const optionText = getLocalizedField(question, `option${letter}`) || '';
              let optionStatus = '';
              const isSelected = studentAnswer === letter;
              const isCorrect = correctAnswer === letter;

              if (!studentAnswer) {
                optionStatus = 'unattempted';
              } else if (isCorrect && isSelected) {
                optionStatus = 'selected-correct';
              } else if (isCorrect) {
                optionStatus = 'correct';
              } else if (isSelected) {
                optionStatus = 'selected-wrong';
              }

              return buildOptionHtml(letter, optionText, optionStatus);
            })
            .join('');

          const localizedQuestion = getLocalizedField(question, 'question');
          return `
            <article class="review-card" data-status="${status}">
              <div class="review-header">
                <div>
                  <div class="question-meta">Question ${index + 1}</div>
<div class="question-text">${escapeHtml(formatQuestionText(localizedQuestion))}</div>
</div>
                <div class="status-badge status-${status.toLowerCase()}">${status}</div>
              </div>
              ${question.image ? `<img class="question-image" src="${escapeHtml(question.image)}" alt="Question ${index + 1} image">` : ''}
              <div class="options-grid">${options}</div>
              ${question.explanation ? `
<div class="answer-summary">
    <div>
        <strong>Explanation</strong>
        <span>${escapeHtml(question.explanation)}</span>
    </div>
</div>
` : ''}
              <div class="answer-summary">
                <div><strong>Your Answer</strong><span>${studentAnswer || 'Unattempted'}</span></div>
                <div><strong>Correct Answer</strong><span>${correctAnswer || 'N/A'}</span></div>
              </div>
            </article>`;
        })
        .join('');
    }

    function onFilterClick(event) {
      const button = event.target.closest('button[data-filter]');
      if (!button) return;
      const filter = button.dataset.filter;
      document.querySelectorAll('.filter-bar button').forEach((btn) => btn.classList.toggle('active', btn === button));
      document.querySelectorAll('.review-card').forEach((card) => {
        card.style.display = filter === 'All' || card.dataset.status === filter ? '' : 'none';
      });
    }

    function renderReviewSection(questions, answers) {
      return `
        <div class="card review-section">
          <div class="review-top">
            <div>
              <h2>Question Review</h2>
              <p class="neutral-note">Compare student selections with the correct answer and filter by status.</p>
            </div>
            <div class="filter-bar">
              <button class="button-secondary active" type="button" data-filter="All">All</button>
              <button class="button-secondary" type="button" data-filter="Correct">Correct</button>
              <button class="button-secondary" type="button" data-filter="Wrong">Wrong</button>
              <button class="button-secondary" type="button" data-filter="Unattempted">Unattempted</button>
            </div>
          </div>
          <div id="reviewCards" class="review-list">${renderReviewCards(questions, answers)}</div>
        </div>`;
    }

    async function loadResult() {
      const resultId = getQueryParam('resultId');
      if (!resultId) {
        setStatus('Result ID is missing from the URL.', 'error');
        resultContent.innerHTML = '<div class="empty-state">No result could be loaded. Return to categories and try again.</div>';
        return;
      }

      try {
        const resultDoc = await getDoc(doc(db, 'mockResults', resultId));
        if (!resultDoc.exists()) {
          setStatus('Result not found.', 'error');
          resultContent.innerHTML = '<div class="empty-state">The requested result does not exist.</div>';
          return;
        }

        const result = { id: resultDoc.id, ...resultDoc.data() };
        console.log("Result Mock ID:", result.mockId);
        const categoryName = await fetchCategoryName(result.categoryId || result.category || null);
        const questions = await fetchQuestions(result.mockId);

console.log("Questions Loaded:", questions.length);
console.log("Questions:", questions);
console.log("Result Answers:", result.answers);

const answers =
    result.answers && typeof result.answers === "object"
        ? result.answers
        : {};

        resultContent.innerHTML = `
          <div class="card-grid">
            ${renderSummary(result, categoryName)}
          </div>
          ${renderReviewSection(questions, answers)}`;

        setStatus('Result loaded successfully.');
        document.querySelector('.filter-bar')?.addEventListener('click', onFilterClick);
      } catch (error) {
        console.error(error);
        setStatus('Unable to load result data.', 'error');
        resultContent.innerHTML = '<div class="empty-state">An error occurred while loading the result.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      languageSelect.value = getSavedLanguage();
      languageSelect.addEventListener('change', () => {
        saveLanguage(languageSelect.value);
        loadResult();
      });
      loadResult();
    });
  </script>
</body>
</html>
