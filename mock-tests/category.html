<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marudhara Exam | Category</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f4f7fb; color: #1f324f; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#f8fbff 0%,#edf2f8 100%); }
    body, button { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .page-shell { max-width: 1200px; margin: 0 auto; padding: 24px 18px 32px; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 24px; }
    .brand { display: flex; gap: 14px; align-items: center; }
    .brand .logo { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 18px; background: #0b4ea2; color: #fff; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 1.9rem; }
    .brand small { display: block; color: #5f6f8f; margin-top: 2px; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .top-actions a { border-radius: 999px; padding: 12px 18px; background: #0b4ea2; color: #fff; }
    .top-actions a:hover { background: #0f3c7f; }
    .status-bar { margin-bottom: 24px; padding: 14px 18px; border-radius: 18px; background: #eef4ff; color: #102a52; font-weight: 600; }
    .status-bar.error { background: #ffe7e6; color: #8a1f19; }
    .category-header { display: grid; gap: 18px; margin-bottom: 20px; }
    .category-summary { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 22px; padding: 22px; }
    .category-summary .icon { width: 92px; height: 92px; border-radius: 22px; background: #eef4ff; display: grid; place-items: center; }
    .category-summary img { width: 100%; height: 100%; object-fit: contain; border-radius: 18px; }
    .category-summary .details { display: grid; gap: 10px; }
    .category-summary h2 { margin: 0; font-size: 1.4rem; }
    .category-summary p { margin: 0; color: #556180; line-height: 1.7; }
    .tests-grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); }
    .test-card { background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 24px; padding: 22px; display: flex; flex-direction: column; gap: 14px; min-height: 260px; transition: transform .2s ease, box-shadow .2s ease; }
    .test-card:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(23,42,77,.08); }
    .test-card h3 { margin: 0; font-size: 1.15rem; }
    .test-card p { margin: 0; color: #556180; line-height: 1.75; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: #eef4ff; color: #0b4ea2; font-size: 0.95rem; }
    /* FEATURE 6: status badge colors - LIVE (green), Scheduled/locked (orange) */
    .badge.badge-live { background: #e6f7ea; color: #1e583a; }
    .badge.badge-locked { background: #fff4e5; color: #a15c00; }
    .button-primary { border: 0; border-radius: 14px; padding: 12px 18px; background: #0b4ea2; color: #fff; cursor: pointer; }
    .button-primary:hover { background: #0f3c7f; }
    .empty-state { padding: 32px 24px; border-radius: 24px; background: #fff; border: 1px dashed rgba(35,49,79,.15); color: #556180; text-align: center; }
    @media (max-width: 720px) { .category-summary { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Mock Tests</h1>
          <small>Select a test from the chosen category and review exam details before starting.</small>
        </div>
      </div>
      <div class="top-actions">
        <a href="index.html">Back to categories</a>
      </div>
    </header>

    <div id="statusBar" class="status-bar">Loading category…</div>
    <section id="categoryHeader" class="category-header"></section>
    <div id="subCategoryNav" style="display:none; margin-bottom:14px;">
      <button type="button" class="button-primary" id="backToSubCategoriesBtn">← Back to Sub Categories</button>
    </div>
    <section id="testsGrid" class="tests-grid"></section>
  </div>

  <script type="module">
    import { db } from '../firebase.js';
    import { collection, doc, getDoc, getDocs, query, where, orderBy, getCountFromServer } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

    const statusBar = document.getElementById('statusBar');
    const categoryHeader = document.getElementById('categoryHeader');
    const testsGrid = document.getElementById('testsGrid');
    const subCategoryNav = document.getElementById('subCategoryNav');
    const backToSubCategoriesBtn = document.getElementById('backToSubCategoriesBtn');

    let currentCategoryId = null;
    let currentSubCategories = [];
    let currentSubCategoryCounts = [];

    function setStatus(message, type = 'info') {
      statusBar.textContent = message;
      statusBar.className = type === 'error' ? 'status-bar error' : 'status-bar';
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showSubCategoryNav() {
      subCategoryNav.style.display = '';
    }

    function hideSubCategoryNav() {
      subCategoryNav.style.display = 'none';
    }

    function renderCategoryHeader(category) {
      const isFree = category.isFree !== false;
      const accessBadge = isFree
        ? '<span class="badge badge-live">Free</span>'
        : `<span class="badge">Premium — <s>₹${escapeHtml(category.originalPrice ?? '')}</s> ₹${escapeHtml(category.offerPrice ?? '—')}</span>`;
      categoryHeader.innerHTML = `
        <div class="category-summary">
          <div class="icon">${(category.image || category.icon) ? `<img src="${escapeHtml(category.image || category.icon)}" alt="${escapeHtml(category.name)} icon">` : '<div class="fallback-icon">📚</div>'}</div>
          <div class="details">
            <h2>${escapeHtml(category.name)}</h2>
            <p>${escapeHtml(category.description || 'Browse available mock tests for this category and begin your practice session.')}</p>
            <div class="badge-row">${accessBadge}</div>
          </div>
        </div>`;
    }

    // FEATURE 1 & 9: safely read liveDateTime; missing/invalid values mean the mock
    // is treated as always LIVE, so old mock documents keep working unchanged.
    function getMockLiveState(test) {
      if (!test.liveDateTime) {
        return { locked: false, liveMoment: null };
      }
      const liveMoment = new Date(test.liveDateTime);
      if (Number.isNaN(liveMoment.getTime())) {
        return { locked: false, liveMoment: null };
      }
      // FEATURE 2: locked when current time is before the mock's live date/time
      return { locked: Date.now() < liveMoment.getTime(), liveMoment };
    }

    // FEATURE 3 & 8: format a live moment as "04 Jul 2026" / "09:00 PM"
    function formatLiveMoment(liveMoment) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const day = String(liveMoment.getDate()).padStart(2, '0');
      const month = months[liveMoment.getMonth()];
      const year = liveMoment.getFullYear();
      let hours = liveMoment.getHours();
      const minutes = String(liveMoment.getMinutes()).padStart(2, '0');
      const meridiem = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      if (hours === 0) hours = 12;
      const hoursLabel = String(hours).padStart(2, '0');
      return { dateLabel: `${day} ${month} ${year}`, timeLabel: `${hoursLabel}:${minutes} ${meridiem}` };
    }

    // FEATURE 7: live mocks first, then upcoming/locked mocks. Firestore query and
    // existing ordering within each group are untouched; this only re-groups the
    // already-fetched array using a stable sort.
    function sortMocksByLiveStatus(tests) {
      function sortMocksBySeries(tests) {

    return [...tests].sort((a, b) => {

        const aNo = parseInt(String(a.title || a.name || "").match(/\d+/)?.[0] || "0");

        const bNo = parseInt(String(b.title || b.name || "").match(/\d+/)?.[0] || "0");

        return aNo - bNo;

    });

}
      return [...tests].sort((a, b) => {
        const aLocked = getMockLiveState(a).locked ? 1 : 0;
        const bLocked = getMockLiveState(b).locked ? 1 : 0;
        return aLocked - bLocked;
      });
    }

    // FEATURE 10: used by both the direct category flow and the sub category flow,
    // so lock/badge/sort behaviour is automatically identical for both.
    function renderMockTestCards(tests) {
      return tests.map(test => {
        const title = escapeHtml(test.title || test.name || 'Unnamed test');
        const questions = Number(test.totalQuestions ?? test.questions ?? 0);
        const duration = Number(test.duration ?? test.durationMinutes ?? 0);
        const totalMarks = Number(test.totalMarks ?? test.marks ?? 0);
        const negativeMarks = Number(test.negativeMarks ?? test.penalty ?? 0);

        // FEATURE 1, 2, 9: safe lock-state read (defaults to LIVE when data is missing)
        const liveState = getMockLiveState(test);
        const locked = liveState.locked;

        // FEATURE 6: LIVE (green) vs Scheduled (orange) badge
        const statusBadge = locked
          ? '<span class="badge badge-locked">Scheduled</span>'
          : '<span class="badge badge-live">LIVE</span>';

        // FEATURE 3 & 8: locked notice with formatted live date/time
        let lockNotice = '';
        if (locked && liveState.liveMoment) {
          const { dateLabel, timeLabel } = formatLiveMoment(liveState.liveMoment);
          lockNotice = `<p>🔒 Live on<br>${dateLabel}<br>${timeLabel}</p>`;
        }

        // FEATURE 4 & 5: disable + relabel the button when locked; unchanged when live
        const questionsUnavailable = questions <= 0;
        const isDisabled = locked || questionsUnavailable;
        const buttonLabel = locked ? 'Coming Soon' : (questionsUnavailable ? 'No questions available' : 'Start exam');
        const onClickAttr = locked ? '' : ` onclick="window.location.href='confirm.html?mockId=${encodeURIComponent(test.id)}';"`;

        return `
          <article class="test-card">
            <h3>${title}</h3>
            <div class="badge-row">
              <span class="badge">Questions: ${questions}</span>
              <span class="badge">Duration: ${duration || 0} min</span>
            </div>
            <div class="badge-row">
              <span class="badge">Total Marks: ${totalMarks || 0}</span>
              <span class="badge">Negative: ${negativeMarks || 0}</span>
            </div>
            <div class="badge-row">
              ${statusBadge}
            </div>
            <p>${escapeHtml(test.description || 'Timed practice exam with one question view and live progress tracking.')}</p>
            ${lockNotice}
            <button class="button-primary" type="button" ${isDisabled ? 'disabled' : ''}${onClickAttr}>${buttonLabel}</button>
          </article>`;
      }).join('');
    }

    function renderSubCategoryCards(subCategoriesList, counts) {
      return subCategoriesList.map((sub, index) => {
        const name = escapeHtml(sub.name || 'Unnamed sub category');
        const description = escapeHtml(sub.description || 'Browse mock tests inside this sub category.');
        const count = Number(counts[index] || 0);
        return `
          <article class="test-card">
            <h3>${name}</h3>
            <div class="badge-row">
              <span class="badge">Mock Tests: ${count}</span>
            </div>
            <p>${description}</p>
            <button class="button-primary" type="button" data-subcategory-id="${escapeHtml(sub.id)}" data-subcategory-name="${escapeHtml(sub.name || '')}">Open</button>
          </article>`;
      }).join('');
    }

    async function countMockTestsInSubCategory(categoryId, subCategoryId) {
      try {
        const countQuery = query(
          collection(db, 'mockTests'),
          where('categoryId', '==', categoryId),
          where('subCategoryId', '==', subCategoryId)
        );
        const snapshot = await getCountFromServer(countQuery);
        return snapshot.data().count;
      } catch (error) {
        console.error(error);
        return 0;
      }
    }

    async function loadMockTestsForCategory(categoryId) {
      hideSubCategoryNav();
      setStatus('Loading mock tests…');
      const testsQuery = query(collection(db, 'mockTests'), where('categoryId', '==', categoryId));
      const testsSnapshot = await getDocs(testsQuery);
      console.log('mockTests snapshot size:', testsSnapshot.size);
      const tests = testsSnapshot.docs.map(docSnap => {
        console.log('Loaded mock doc:', docSnap.id, docSnap.data());
        return { id: docSnap.id, ...docSnap.data() };
      });

      if (!tests.length) {
        testsGrid.innerHTML = '<div class="empty-state">No mock tests found</div>';
        setStatus('No mock tests found.', 'error');
        return;
      }

      // FEATURE 7: live mocks first, then upcoming/locked mocks (sorted after fetch only)
testsGrid.innerHTML =
    renderMockTestCards(
        sortMocksByLiveStatus(
            sortMocksBySeries(tests)
        )
    );      setStatus('Choose a test and confirm your details before starting.');
    }

    async function loadSubCategoryList(categoryId) {
      hideSubCategoryNav();
      setStatus('Loading sub categories…');

      const subCategoryQuery = query(
        collection(db, 'mockSubCategories'),
        where('categoryId', '==', categoryId),
        orderBy('order', 'asc')
      );
      const snapshot = await getDocs(subCategoryQuery);
      currentSubCategories = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));

      if (!currentSubCategories.length) {
        currentSubCategoryCounts = [];
        testsGrid.innerHTML = '<div class="empty-state">No Sub Categories Found</div>';
        setStatus('No sub categories found.', 'error');
        return;
      }

      currentSubCategoryCounts = await Promise.all(
        currentSubCategories.map(sub => countMockTestsInSubCategory(categoryId, sub.id))
      );

      testsGrid.innerHTML = renderSubCategoryCards(currentSubCategories, currentSubCategoryCounts);
      setStatus('Choose a sub category to view its mock tests.');
    }

    function renderSubCategoryListFromCache() {
      hideSubCategoryNav();
      if (!currentSubCategories.length) {
        testsGrid.innerHTML = '<div class="empty-state">No Sub Categories Found</div>';
        setStatus('No sub categories found.', 'error');
        return;
      }
      testsGrid.innerHTML = renderSubCategoryCards(currentSubCategories, currentSubCategoryCounts);
      setStatus('Choose a sub category to view its mock tests.');
    }

    async function openSubCategoryTests(categoryId, subCategoryId, subCategoryName) {
      try {
        showSubCategoryNav();
        setStatus(`Loading mock tests for "${subCategoryName}"…`);

        const testsQuery = query(
          collection(db, 'mockTests'),
          where('categoryId', '==', categoryId),
          where('subCategoryId', '==', subCategoryId)
        );
        const testsSnapshot = await getDocs(testsQuery);
        const tests = testsSnapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));

        if (!tests.length) {
          testsGrid.innerHTML = '<div class="empty-state">No Mock Tests Found</div>';
          setStatus('No mock tests found for this sub category.', 'error');
          return;
        }

        // FEATURE 7 & 10: same live-first sort applied through the shared renderer
        testsGrid.innerHTML = renderMockTestCards(sortMocksByLiveStatus(tests));
        setStatus('Choose a test and confirm your details before starting.');
      } catch (error) {
        console.error(error);
        testsGrid.innerHTML = '<div class="empty-state">Unable to load mock tests. Try refreshing the page.</div>';
        setStatus('Failed to load tests.', 'error');
      }
    }

    async function loadCategory() {
      const categoryId = new URLSearchParams(location.search).get('id');
      console.log('categoryId:', categoryId);
      if (!categoryId) {
        setStatus('Category ID is missing.', 'error');
        testsGrid.innerHTML = '<div class="empty-state">Invalid category selection. Return to categories and choose again.</div>';
        return;
      }

      try {
        setStatus('Loading category details…');
        const categoryDoc = await getDoc(doc(db, 'mockCategories', categoryId));
        if (!categoryDoc.exists()) {
          setStatus('Category not found.', 'error');
          testsGrid.innerHTML = '<div class="empty-state">Selected category does not exist.</div>';
          return;
        }

        const category = { id: categoryDoc.id, ...categoryDoc.data() };
        currentCategoryId = category.id;
        renderCategoryHeader(category);

        if (category.hasSubCategory) {
          await loadSubCategoryList(category.id);
        } else {
          await loadMockTestsForCategory(category.id);
        }
      } catch (error) {
        console.error(error);
        testsGrid.innerHTML = '<div class="empty-state">Unable to load mock tests. Try refreshing the page.</div>';
        setStatus('Failed to load tests.', 'error');
      }
    }

    testsGrid.addEventListener('click', event => {
      const openButton = event.target.closest('[data-subcategory-id]');
      if (!openButton || !testsGrid.contains(openButton)) {
        return;
      }
      const subCategoryId = openButton.dataset.subcategoryId;
      const subCategoryName = openButton.dataset.subcategoryName || '';
      openSubCategoryTests(currentCategoryId, subCategoryId, subCategoryName);
    });

    backToSubCategoriesBtn.addEventListener('click', renderSubCategoryListFromCache);

    document.addEventListener('DOMContentLoaded', loadCategory);
  </script>
</body>
</html>
