<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result - मरुधरा एग्जाम</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}

.card{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
}

.score{
    text-align:center;
    font-size:50px;
    color:#FF8C00;
    margin:20px 0;
}

p{
    font-size:20px;
    margin:10px 0;
}

.btn{
    display:block;
    text-align:center;
    padding:15px;
    background:#002B5B;
    color:white;
    text-decoration:none;
    border-radius:10px;
    margin-top:25px;
}
</style>

</head>
<body>

<div class="card">

<h1>📊 मरुधरा एग्जाम परिणाम</h1>

<div class="score" id="score">0%</div>

<p><b>नाम :</b> <span id="name"></span></p>
<p><b>रोल नंबर :</b> <span id="roll"></span></p>

<p><b>✅ सही :</b> <span id="correct"></span></p>
<p><b>❌ गलत :</b> <span id="wrong"></span></p>
<p><b>⚪ छोड़े गए :</b> <span id="skipped"></span></p>

<a href="index.html" class="btn">🏠 Home Page</a>

</div>

<script>

let correct = parseInt(localStorage.getItem("correct")) || 0;
let wrong = parseInt(localStorage.getItem("wrong")) || 0;
let skipped = parseInt(localStorage.getItem("skipped")) || 0;

let total = correct + wrong + skipped;

let percentage = 0;

if(total > 0){
    percentage = ((correct / total) * 100).toFixed(2);
}

document.getElementById("score").innerText =
percentage + "%";

document.getElementById("name").innerText =
localStorage.getItem("studentName") || "N/A";

document.getElementById("roll").innerText =
localStorage.getItem("rollNo") || "N/A";

document.getElementById("correct").innerText = correct;
document.getElementById("wrong").innerText = wrong;
document.getElementById("skipped").innerText = skipped;

</script>

</body>
</html>
