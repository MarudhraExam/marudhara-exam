<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Result Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h2{text-align:center;color:#002B5B}
label{display:block;margin-top:15px;font-weight:bold}
input{width:100%;padding:10px;margin-top:5px;box-sizing:border-box}
button{margin-top:20px;width:100%;padding:12px;background:#002B5B;color:#fff;border:0;border-radius:6px;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#002B5B;color:#fff}
</style>
</head>
<body>
<div class="container">
<h2>📊 Result Manager</h2>
<label>Exam Name</label>
<input id="examName">
<label>Result PDF</label>
<input id="resultPdf" type="file" accept=".pdf">
<button onclick="saveResult()">Upload Result</button>

<table>
<thead><tr><th>Exam</th><th>PDF</th><th>Action</th></tr></thead>
<tbody id="resultList"></tbody>
</table>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {getFirestore,collection,addDoc,getDocs,deleteDoc,doc} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const firebaseConfig={
apiKey:"AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain:"marudhara-exam.firebaseapp.com",
projectId:"marudhara-exam",
storageBucket:"marudhara-exam.firebasestorage.app",
messagingSenderId:"680152404373",
appId:"1:680152404373:web:23515d1d06c44dbd33669c"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

async function readPdf(file){
 const ab=await file.arrayBuffer();
 const pdf=await pdfjsLib.getDocument({data:ab}).promise;
 let txt="";
 for(let i=1;i<=pdf.numPages;i++){
   const p=await pdf.getPage(i);
   const c=await p.getTextContent();
   txt+=c.items.map(x=>x.str).join(" ")+"\n";
 }
 return txt;
}

window.saveResult=async()=>{
 const exam=document.getElementById("examName").value.trim();
 const file=document.getElementById("resultPdf").files[0];
 if(!exam){alert("Exam Name likho");return;}
 if(!file){alert("PDF Select karo");return;}
 const text=await readPdf(file);
 console.log(text);
 await addDoc(collection(db,"results"),{
   examName:exam,
   pdfName:file.name,
   pdfText:text,
   createdAt:new Date().toISOString()
 });
 alert("Saved");
 loadResults();
};

window.deleteResult=async(id)=>{
 await deleteDoc(doc(db,"results",id));
 loadResults();
};

async function loadResults(){
 const tb=document.getElementById("resultList");
 tb.innerHTML="";
 const snap=await getDocs(collection(db,"results"));
 snap.forEach(d=>{
   const x=d.data();
   tb.innerHTML+=`<tr><td>${x.examName}</td><td>${x.pdfName}</td><td><button onclick="deleteResult('${d.id}')">Delete</button></td></tr>`;
 });
}
loadResults();
</script>
</body>
</html>
