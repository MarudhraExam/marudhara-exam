<!DOCTYPE html>
<html lang="hi">
<head>

<title>Student Corner</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
margin:0;

}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
color:#002B5B;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);

cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}
.card h2{
font-size:32px;
margin-bottom:15px;
color:#002B5B;
font-weight:700;
}

.card p{
font-size:18px;
color:#555;
margin:0;
}
.card h2{
color:#002B5B;
}

</style>

</head>
<body>

<div class="container">

<h1>🎓 Student Corner</h1>

<div class="grid">

<div class="card"
onclick="location.href='daily-suja-sar.html'"

<h2>📘 Daily Sujas Sar</h2>
<p>Daily Current Affairs PDF</p>

</div>

<div class="card"
onclick="location.href='downloads.html'">

<h2>📥 Downloads</h2>
<p>All Study Material</p>

</div>

<div class="card"
onclick="location.href='quiz-section.html'">

</div>

</div>

</div>
