<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mock Test Manager</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
color:#002B5B;
}

.card{
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
margin-bottom:20px;
}

input,
select{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:15px;
padding:12px 20px;
background:#002B5B;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#004080;
}

</style>

</head>

<body>

<div class="container">

<h1>🎯 Mock Test Manager</h1>

<div class="card">

<h2>➕ Create Category</h2>

<input
type="text"
id="categoryName"
placeholder="Category Name">

<input
type="text"
id="categoryIcon"
placeholder="Category Icon URL">

<input
type="number"
id="categoryOrder"
placeholder="Display Order">

<button id="saveCategoryBtn">
Save Category
</button>

</div>

<div class="card">

<h2>📂 Category List</h2>

<div id="categoryList">

Loading...

</div>

</div>

</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
orderBy,
query
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain:"marudhara-exam.firebaseapp.com",
projectId:"marudhara-exam",
storageBucket:"marudhara-exam.firebasestorage.app",
messagingSenderId:"680152404373",
appId:"1:680152404373:web:23515d1d06c44dbd33669c"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadCategories(){

const list =
document.getElementById("categoryList");

list.innerHTML="Loading...";

const q =
query(
collection(db,"mockCategories"),
orderBy("order")
);

const snapshot =
await getDocs(q);

list.innerHTML="";

snapshot.forEach((cat)=>{

const data = cat.data();

list.innerHTML += `

<div style="
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
">

<div>

<b>${data.name}</b>

<br>

Order : ${data.order}

</div>

<div>

<button
onclick="editCategory('${cat.id}')"
style="background:#ff9800;margin-right:8px;">
Edit
</button>

<button
onclick="deleteCategory('${cat.id}')"
style="background:red;">
Delete
</button>

</div>

</div>

`;

});

}

window.deleteCategory =
async function(id){

if(!confirm("Delete Category ?"))
return;

await deleteDoc(
doc(db,"mockCategories",id)
);

loadCategories();

};

document
.getElementById("saveCategoryBtn")
.onclick = async ()=>{

const name =
document.getElementById("categoryName").value;

const icon =
document.getElementById("categoryIcon").value;

const order =
Number(
document.getElementById("categoryOrder").value
);

if(name==""){
alert("Category Name Required");
return;
}

await addDoc(
collection(db,"mockCategories"),
{
name,
icon,
order,
createdAt:new Date().toISOString()
}
);

document.getElementById("categoryName").value="";
document.getElementById("categoryIcon").value="";
document.getElementById("categoryOrder").value="";

loadCategories();

};

loadCategories();

</script>
</body>
</html>
