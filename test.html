<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>मरुधरा एग्जाम - टेस्ट</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    color:#002B5B;
    margin-bottom:20px;
}

.progress{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#FF8C00;
    transition:.3s;
}

.question{
    font-size:24px;
    margin:25px 0;
    font-weight:bold;
}

.option{
    display:block;
    padding:14px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.2s;
}

.option:hover{
    background:#f7f7f7;
}

.option input{
    margin-right:10px;
}

.btns{
    display:flex;
    justify-content:space-between;
    gap:10px;
    margin-top:25px;
}

button{
    flex:1;
    padding:14px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
    font-size:16px;
}

.prev{
    background:#666;
}

.next{
    background:#FF8C00;
}

.submit{
    background:green;
}

.info{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

@media(max-width:600px){

.btns{
    flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<div class="info">

<h2 id="studentInfo"></h2>

<p>
<b>परीक्षा :</b>
<span id="examName"></span>
</p>

<p>
<b>पेपर कोड :</b>
<span id="paperCode"></span>
</p>

</div>

<div class="progress">

<div
class="progress-bar"
id="bar">
</div>

</div>

<div
class="question"
id="questionText">
</div>

<div id="options"></div>

<div class="btns">

<button
class="prev"
onclick="prevQuestion()">
Previous
</button>

<button
class="next"
id="nextBtn"
onclick="nextQuestion()">
Next
</button>

<button
class="submit"
id="submitBtn"
style="display:none"
onclick="submitTest()">
Submit Test
</button>

</div>

</div>

<script>

const examData =
JSON.parse(
localStorage.getItem(
"selectedExam"
)
);

if(!examData){

alert(
"पहले परीक्षा चुनें"
);

window.location.href =
"omr.html";

}

const totalQuestions =
parseInt(
examData.totalQuestions
);

const answerArray =
examData.answerKey
.split(",");

let answerKey = {};

answerArray.forEach(
(ans,index)=>{

answerKey[index+1] =
ans.trim();

});

let current = 1;

let answers = {};

document.getElementById(
"studentInfo"
).innerHTML =

(localStorage.getItem(
"studentName"
) || "")

+

" | Roll No : "

+

(localStorage.getItem(
"rollNo"
) || "");

document.getElementById(
"examName"
).innerText =
examData.examName;

document.getElementById(
"paperCode"
).innerText =
examData.paperCode;

function loadQuestion(){

document.getElementById(
"questionText"
).innerHTML =

"प्रश्न " +
current +
" / " +
totalQuestions;

document.getElementById(
"bar"
).style.width =

(current /
totalQuestions *
100)

+ "%";

let html = "";

["A","B","C","D","E"]
.forEach(option=>{

html += `

<label class="option">

<input
type="radio"
name="answer"
value="${option}"

${answers[current]
=== option
?
"checked"
:
""}

>

${option}

${option==="E"
?
"(Not Attempted)"
:
""}

</label>

`;

});

document.getElementById(
"options"
).innerHTML = html;

if(
current === totalQuestions
){

document.getElementById(
"nextBtn"
).style.display =
"none";

document.getElementById(
"submitBtn"
).style.display =
"block";

}
else{

document.getElementById(
"nextBtn"
).style.display =
"block";

document.getElementById(
"submitBtn"
).style.display =
"none";

}

}

function saveAnswer(){

const selected =

document.querySelector(
'input[name="answer"]:checked'
);

if(selected){

answers[current] =
selected.value;

}

}

function nextQuestion(){

const selected =

document.querySelector(
'input[name="answer"]:checked'
);

if(!selected){

alert(
"कृपया A/B/C/D/E में से एक विकल्प चुनें"
);

return;

}

saveAnswer();

if(
current < totalQuestions
){

current++;

loadQuestion();

}

}

function prevQuestion(){

saveAnswer();

if(
current > 1
){

current--;

loadQuestion();

}

}

function submitTest(){

const selected =

document.querySelector(
'input[name="answer"]:checked'
);

if(!selected){

alert(
"कृपया A/B/C/D/E में से एक विकल्प चुनें"
);

return;

}

saveAnswer();

let correct = 0;
let wrong = 0;
let eCount = 0;
let blank = 0;
let questionAnalysis = [];
for(
let i=1;
i<=totalQuestions;
i++
){

const studentAnswer =
answers[i];

if(
studentAnswer === undefined
){

blank++;

}
else if(
studentAnswer === "E"
){

eCount++;

}
else if(
studentAnswer === answerKey[i]
){

correct++;

}
else{

wrong++;

}

}

localStorage.setItem(
"correct",
correct
);

localStorage.setItem(
"wrong",
wrong
);

localStorage.setItem(
"eCount",
eCount
);

localStorage.setItem(
"blank",
blank
);

localStorage.setItem(
"answers",
JSON.stringify(
answers
)
);

localStorage.setItem(
"examName",
examData.examName
);

localStorage.setItem(
"paperCode",
examData.paperCode
);

localStorage.setItem(
"examDate",
examData.examDate || ""
);

localStorage.setItem(
"correctMarks",
examData.correctMarks
);

localStorage.setItem(
"negativeMarks",
examData.negativeMarks
);

localStorage.setItem(
"passPercentage",
examData.passPercentage || 40
);

localStorage.setItem(
"deletedQuestions",
examData.deletedQuestions || ""
);

localStorage.setItem(
"totalQuestions",
totalQuestions
);

window.location.href =
"result.html";

}

loadQuestion();

</script>

</body>
</html>
