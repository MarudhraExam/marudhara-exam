```html
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel - मरुधरा एग्जाम</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
    margin-bottom:20px;
}

input, textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    background:#FF8C00;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">

<h1>⚙️ Admin Panel</h1>

<label>Exam Name</label>
<input type="text" id="examName">

<label>Paper Code</label>
<input type="text" id="paperCode">

<label>Total Questions</label>
<input type="number" id="totalQuestions">

<label>Correct Marks</label>
<input type="number" id="correctMarks" value="2">

<label>Negative Marks</label>
<input type="number" id="negativeMarks" value="0.33" step="0.01">

<label>Answer Key</label>

<textarea id="answerKey" rows="8"
placeholder="उदाहरण:
B,D,A,C,B,A,D,C,A,B">
</textarea>

<button onclick="saveExam()">
Save Exam
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain: "marudhara-exam.firebaseapp.com",
projectId: "marudhara-exam",
storageBucket: "marudhara-exam.firebasestorage.app",
messagingSenderId: "680152404373",
appId: "1:680152404373:web:23515d1d06c44dbd33669c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.saveExam = async function(){

try{

const examData = {

examName:
document.getElementById("examName").value,

paperCode:
document.getElementById("paperCode").value,

totalQuestions:
Number(document.getElementById("totalQuestions").value),

correctMarks:
Number(document.getElementById("correctMarks").value),

negativeMarks:
Number(document.getElementById("negativeMarks").value),

answerKey:
document.getElementById("answerKey").value

};

await addDoc(
collection(db,"exams"),
examData
);

alert("Exam Saved To Firebase ✅");

document.getElementById("examName").value = "";
document.getElementById("paperCode").value = "";
document.getElementById("totalQuestions").value = "";
document.getElementById("answerKey").value = "";

}catch(error){

alert("Error: " + error.message);

}

}

</script>

</body>
</html>
