```html
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMR Check - मरुधरा एग्जाम</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#FF8C00;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}

.info{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>

</head>
<body>

<div class="container">

<h1>OMR चेक करें</h1>

<div class="info">
<p><strong>परीक्षा :</strong> <span id="examName"></span></p>
<p><strong>प्रश्नपत्र कोड :</strong> <span id="paperCode"></span></p>
</div>

<label>नाम</label>
<input type="text" id="name">

<label>रोल नंबर</label>
<input type="text" id="roll">

<button onclick="startExam()">
OMR भरना शुरू करें
</button>

</div>

<script>

const examData =
JSON.parse(localStorage.getItem("examData"));

if(examData){

document.getElementById("examName").innerText =
examData.examName;

document.getElementById("paperCode").innerText =
examData.paperCode;

}else{

alert("पहले Admin Panel में Exam Save करें");
window.location.href="admin.html";

}

function startExam(){

const name =
document.getElementById("name").value;

const roll =
document.getElementById("roll").value;

if(name==="" || roll===""){
alert("नाम और रोल नंबर भरें");
return;
}

localStorage.setItem("studentName",name);
localStorage.setItem("rollNo",roll);

localStorage.setItem(
"examName",
examData.examName
);

localStorage.setItem(
"paperCode",
examData.paperCode
);

window.location.href="test.html";

}

</script>

</body>
</html>
```
