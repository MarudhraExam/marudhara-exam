<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMR Scanner - मरुधरा एग्जाम</title>

<style>

body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f6fa;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

img,canvas{
max-width:100%;
border:1px solid #ddd;
border-radius:8px;
margin-top:10px;
}

button{
width:100%;
padding:15px;
background:#FF8C00;
color:white;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

#resultBox{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:8px;
display:none;
background:#f8f9fa;
}

</style>

<script async src="https://docs.opencv.org/4.13.0/opencv.js"></script>

</head>

<body>

<div class="container">

<h2>📷 Original OMR</h2>

<img id="omrPreview">

<button onclick="scanOMR()">
🔍 OMR Scan करें
</button>

<div id="resultBox"></div>

<h2>🖤 Processed OMR</h2>

<canvas id="canvasOutput"></canvas>

</div>

<script>

const image =
localStorage.getItem("omrImage");

const omrPreview =
document.getElementById("omrPreview");

omrPreview.src = image;

window.scanOMR = function(){

const resultBox =
document.getElementById("resultBox");

resultBox.style.display = "block";

resultBox.innerHTML =
"⏳ Processing Image...";

let count = 0;

const timer = setInterval(()=>{

count++;

if(typeof cv !== "undefined"){

clearInterval(timer);

processOMR();

return;

}

if(count >= 10){

clearInterval(timer);

resultBox.innerHTML =
"❌ OpenCV Load नहीं हुआ";

}

},1000);

};

function processOMR(){

const resultBox =
document.getElementById("resultBox");

const src =
cv.imread("omrPreview");

const gray =
new cv.Mat();

cv.cvtColor(
src,
gray,
cv.COLOR_RGBA2GRAY
);

const thresh =
new cv.Mat();

cv.threshold(
gray,
thresh,
150,
255,
cv.THRESH_BINARY
);

const rect = new cv.Rect(
70,
430,
820,
620
);

const cropped =
thresh.roi(rect);

cv.imshow(
"canvasOutput",
cropped
);


resultBox.innerHTML =

"✅ Image Processing Complete<br><br>" +

"Grayscale + Threshold Applied";

src.delete();
gray.delete();
thresh.delete();
cropped.delete();


}

</script>

</body>
</html>
