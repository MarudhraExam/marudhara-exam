<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vacancy Updates - मरुधरा एग्जाम</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f6fa;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#002B5B;
}

.vacancy{
border:1px solid #ddd;
padding:15px;
margin-top:15px;
border-radius:10px;
cursor:pointer;
}

.vacancy h3{
margin:0;
color:#002B5B;
}
.new-badge{

display:inline-block;
margin-left:10px;
padding:4px 10px;
background:linear-gradient(45deg,#ff0000,#ff9900);
color:#fff;
font-size:11px;
font-weight:bold;
border-radius:30px;

animation:newPulse .8s infinite alternate;

box-shadow:0 0 12px rgba(255,0,0,.6);

}

@keyframes newPulse{

0%{

transform:scale(1);

box-shadow:0 0 5px red;

}

100%{

transform:scale(1.18);

box-shadow:0 0 20px orange;

}

}
</style>

</head>

<body>

<div class="container">

<h1>📢 Vacancy Updates</h1>

<div id="vacancyList">
Loading Vacancies...
</div>

</div>
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
query,
orderBy
}
from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain:"marudhara-exam.firebaseapp.com",
projectId:"marudhara-exam",
storageBucket:"marudhara-exam.firebasestorage.app",
messagingSenderId:"680152404373",
appId:"1:680152404373:web:23515d1d06c44dbd33669c"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadVacancies(){

const vacancyList =
document.getElementById("vacancyList");

vacancyList.innerHTML = "";
let index = 0;
const q = query(
collection(db,"vacancies"),
orderBy("createdAt","desc")
);

const snapshot =
await getDocs(q);

snapshot.forEach((vacancy)=>{

const data = vacancy.data();

const div =
document.createElement("div");

div.className = "vacancy";
const badge =
index < 2
? `<span class="new-badge">NEW</span>`
: "";
div.innerHTML = `
<h3>
${data.vacancyName}
${badge}
</h3>

<p>Click to View Details</p>
`;

div.onclick = function(){

localStorage.setItem(
"selectedVacancy",
JSON.stringify(data)
);

window.location.href =
"vacancy-details.html";

};

vacancyList.appendChild(div);
index++;
});

}

loadVacancies();

</script>

</body>
</html>
