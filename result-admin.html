<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Result Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Arial;background:#f5f7fa;margin:0;padding:20px}
.container{max-width:900px;margin:auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
h2{text-align:center;color:#002B5B}
label{display:block;margin-top:15px;font-weight:bold}
input{width:100%;padding:10px;margin-top:5px;box-sizing:border-box}
button{margin-top:20px;width:100%;padding:12px;background:#002B5B;color:#fff;border:0;border-radius:6px;cursor:pointer}
table{width:100%;margin-top:20px;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:8px;text-align:center}
th{background:#002B5B;color:#fff}
</style>
</head>
<body>
<div class="container">
<h2>📊 Result Manager</h2>
<label>Exam Name</label>
<input id="examName">
<label>Result PDF</label>
<input id="resultPdf" type="file" accept=".pdf">

<div style="border:1px solid #ddd;padding:15px;border-radius:10px;margin-top:15px;">
<label style="display:flex;align-items:center;gap:8px;margin-top:0;">
<input type="checkbox" id="resultNotifEnabled" checked style="width:auto;margin:0;">
🔔 Send Push Notification
</label>
<label>Notification Title</label>
<input type="text" id="resultNotifTitle" placeholder="Auto-filled from Exam Name">
<label>Notification Message</label>
<input type="text" id="resultNotifMessage" placeholder="Auto-filled">
<label>Priority</label>
<select id="resultNotifPriority">
<option value="High">High</option>
<option value="Normal" selected>Normal</option>
<option value="Silent">Silent</option>
</select>
</div>

<button onclick="saveResult()">Upload Result</button>

<table>
<thead><tr><th>Exam</th><th>PDF</th><th>Action</th></tr></thead>
<tbody id="resultList"></tbody>
</table>
</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {getFirestore,collection,addDoc,getDocs,deleteDoc,doc} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";
import { guardAdmin } from "./admin-auth.js";


const firebaseConfig={
apiKey:"AIzaSyDHe87UG-QGy2Kxh7RI8t51qOGgppVd_YA",
authDomain:"marudhara-exam.firebaseapp.com",
projectId:"marudhara-exam",
storageBucket:"marudhara-exam.firebasestorage.app",
messagingSenderId:"680152404373",
appId:"1:680152404373:web:32f4dcb9e16c525d33669c",
measurementId: "G-8PVKGVQ74F"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

// Blocks all page interaction until a signed-in, allow-listed admin
// account is present. Real enforcement happens in firestore.rules.
await guardAdmin(app);

// ---- Notification Configuration (Step 4A: config only, nothing is sent) ----
// Wires the "Send Push Notification" checkbox + Title/Message/Priority
// fields added to the Publish form. Returns helpers to read the current
// values (for saving) and to reset/populate the block.
function setupNotificationConfig(ids, getDefaultTitle, getDefaultMessage, watchIds){
  const enabledEl = document.getElementById(ids.enabled);
  const titleEl = document.getElementById(ids.title);
  const messageEl = document.getElementById(ids.message);
  const priorityEl = document.getElementById(ids.priority);
  if(!enabledEl || !titleEl || !messageEl || !priorityEl) return null;

  let titleTouched = false;
  let messageTouched = false;

  function applyEnabledState(){
    const on = enabledEl.checked;
    titleEl.disabled = !on;
    messageEl.disabled = !on;
    priorityEl.disabled = !on;
  }

  function autoFill(){
    if(!titleTouched && getDefaultTitle) titleEl.value = getDefaultTitle();
    if(!messageTouched && getDefaultMessage) messageEl.value = getDefaultMessage();
  }

  titleEl.addEventListener("input", ()=>{ titleTouched = true; });
  messageEl.addEventListener("input", ()=>{ messageTouched = true; });
  enabledEl.addEventListener("change", applyEnabledState);

  (watchIds || []).forEach((id)=>{
    const el = document.getElementById(id);
    if(el) el.addEventListener("input", autoFill);
  });

  applyEnabledState();

  return {
    getData(){
      return {
        notificationEnabled: enabledEl.checked,
        notificationTitle: titleEl.value.trim(),
        notificationMessage: messageEl.value.trim(),
        notificationPriority: priorityEl.value
      };
    },
    reset(){
      enabledEl.checked = true;
      priorityEl.value = "Normal";
      titleEl.value = "";
      messageEl.value = "";
      titleTouched = false;
      messageTouched = false;
      applyEnabledState();
    }
  };
}

// ---- Push Notification Sender (Step 4B) ----
// Single reusable helper: fires the already-saved notification config to
// the Cloudflare Worker endpoint. Called ONLY after a Firestore save has
// already succeeded. A failure here is logged and swallowed - it must
// never roll back or block the publish flow that already completed.
const PUSH_NOTIFICATION_ENDPOINT = "https://marudhara-payment-api.jmdseller2025.workers.dev/api/send-notification";
const PUSH_NOTIFICATION_AUTH = "Bearer Marudhara@2026*notify";

async function sendPushNotification(notificationData){
  try{
    if(!notificationData || !notificationData.notificationEnabled) return;
    const res = await fetch(PUSH_NOTIFICATION_ENDPOINT,{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":PUSH_NOTIFICATION_AUTH
      },
      body:JSON.stringify({
        enabled: notificationData.notificationEnabled,
        title: notificationData.notificationTitle,
        message: notificationData.notificationMessage,
        priority: notificationData.notificationPriority,
        topic: "marudhara_updates"
      })
    });
    const data = await res.json().catch(()=>null);
    if(!res.ok || !data || data.success !== true){
      console.error("sendPushNotification: non-success response", res.status, data);
    }
  }catch(e){
    console.error("sendPushNotification failed:", e);
  }
}

const resultNotif = setupNotificationConfig(
  { enabled:"resultNotifEnabled", title:"resultNotifTitle", message:"resultNotifMessage", priority:"resultNotifPriority" },
  () => document.getElementById("examName").value,
  () => {
    const name = document.getElementById("examName").value;
    return name ? ("Result Published: " + name) : "";
  },
  ["examName"]
);

async function readPdf(file){
 const ab=await file.arrayBuffer();
 let txt="";
 for(let i=1;i<=pdf.numPages;i++){
   const p=await pdf.getPage(i);
   const c=await p.getTextContent();
   txt+=c.items.map(x=>x.str).join(" ")+"\n";
 }
 return txt;
}

window.saveResult=async()=>{
 const exam=document.getElementById("examName").value.trim();
 const file=document.getElementById("resultPdf").files[0];
 if(!exam){alert("Exam Name likho");return;}
 if(!file){alert("PDF Select karo");return;}
 const text=await readPdf(file);
 console.log(text);
 const notifData = resultNotif ? resultNotif.getData() : {};
 await addDoc(collection(db,"results"),{
   examName:exam,
   pdfName:file.name,
   pdfText:text,
   createdAt:new Date().toISOString(),
   ...notifData
 });
 alert("Saved");
 sendPushNotification(notifData);
 if(resultNotif) resultNotif.reset();
 loadResults();
};

window.deleteResult=async(id)=>{
 await deleteDoc(doc(db,"results",id));
 loadResults();
};

async function loadResults(){
 const tb=document.getElementById("resultList");
 tb.innerHTML="";
 const snap=await getDocs(collection(db,"results"));
 snap.forEach(d=>{
   const x=d.data();
   tb.innerHTML+=`<tr><td>${x.examName}</td><td>${x.pdfName}</td><td><button onclick="deleteResult('${d.id}')">Delete</button></td></tr>`;
 });
}
loadResults();
</script>
</body>
</html>
