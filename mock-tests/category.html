<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marudhara Exam | Category</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f4f7fb; color: #1f324f; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#f8fbff 0%,#edf2f8 100%); }
    body, button { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .page-shell { max-width: 1200px; margin: 0 auto; padding: 24px 18px 32px; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 24px; }
    .brand { display: flex; gap: 14px; align-items: center; }
    .brand .logo { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 18px; background: #0b4ea2; color: #fff; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 1.9rem; }
    .brand small { display: block; color: #5f6f8f; margin-top: 2px; }
    .top-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .top-actions a { border-radius: 999px; padding: 12px 18px; background: #0b4ea2; color: #fff; }
    .top-actions a:hover { background: #0f3c7f; }
    .status-bar { margin-bottom: 24px; padding: 14px 18px; border-radius: 18px; background: #eef4ff; color: #102a52; font-weight: 600; }
    .status-bar.error { background: #ffe7e6; color: #8a1f19; }
    .category-header { display: grid; gap: 18px; margin-bottom: 20px; }
    .category-summary { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 22px; padding: 22px; }
    .category-summary .icon { width: 92px; height: 92px; border-radius: 22px; background: #eef4ff; display: grid; place-items: center; }
    .category-summary img { width: 100%; height: 100%; object-fit: contain; border-radius: 18px; }
    .category-summary .details { display: grid; gap: 10px; }
    .category-summary h2 { margin: 0; font-size: 1.4rem; }
    .category-summary p { margin: 0; color: #556180; line-height: 1.7; }
    .tests-grid { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit,minmax(280px,1fr)); }
    .test-card { background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 24px; padding: 22px; display: flex; flex-direction: column; gap: 14px; min-height: 260px; transition: transform .2s ease, box-shadow .2s ease; }
    .test-card:hover { transform: translateY(-2px); box-shadow: 0 20px 40px rgba(23,42,77,.08); }
    .test-card h3 { margin: 0; font-size: 1.15rem; }
    .test-card p { margin: 0; color: #556180; line-height: 1.75; }
    .badge-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: #eef4ff; color: #0b4ea2; font-size: 0.95rem; }
    /* FEATURE 6: status badge colors - LIVE (green), Scheduled/locked (orange) */
    .badge.badge-live { background: #e6f7ea; color: #1e583a; }
    .badge.badge-locked { background: #fff4e5; color: #a15c00; }
    .button-primary { border: 0; border-radius: 14px; padding: 12px 18px; background: #0b4ea2; color: #fff; cursor: pointer; }
    .button-primary:hover { background: #0f3c7f; }
    .empty-state { padding: 32px 24px; border-radius: 24px; background: #fff; border: 1px dashed rgba(35,49,79,.15); color: #556180; text-align: center; }
    @media (max-width: 720px) { .category-summary { flex-direction: column; align-items: stretch; } }

    /* ---- Coupon UI additions ---- */
    .coupon-section { margin-top: 14px; width: 100%; }
    .coupon-row { display: flex; gap: 8px; align-items: stretch; }
    .coupon-input { flex: 1; border: 1px solid rgba(35,49,79,.18); border-radius: 12px; padding: 12px 14px; font: inherit; font-size: 1rem; color: #1f324f; background: #f8fbff; letter-spacing: .05em; text-transform: uppercase; outline: none; transition: border-color .2s; }
    .coupon-input:focus { border-color: #0b4ea2; background: #fff; }
    .coupon-input:disabled { opacity: .6; cursor: not-allowed; }
    .button-coupon-apply { border: 0; border-radius: 12px; padding: 12px 18px; cursor: pointer; font: inherit; font-weight: 700; font-size: .95rem; background: #0b4ea2; color: #fff; white-space: nowrap; transition: background .2s; }
    .button-coupon-apply:hover:not(:disabled) { background: #0f3c7f; }
    .button-coupon-apply:disabled { opacity: .6; cursor: not-allowed; }
    .coupon-msg { margin-top: 8px; font-size: .9rem; font-weight: 600; min-height: 20px; }
    .coupon-msg.success { color: #1e583a; }
    .coupon-msg.error { color: #8a1f19; }
    .button-coupon-remove { border: 0; border-radius: 12px; padding: 10px 16px; cursor: pointer; font: inherit; font-weight: 700; font-size: .88rem; background: #ffe7e6; color: #8a1f19; margin-top: 6px; transition: background .2s; }
    .button-coupon-remove:hover { background: #ffd0ce; }
    .coupon-breakdown { background: #f4f7fb; border-radius: 14px; padding: 14px 16px; margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
    .coupon-breakdown-row { display: flex; justify-content: space-between; font-size: .95rem; color: #556180; }
    .coupon-breakdown-row.discount { color: #1e583a; font-weight: 700; }
    .coupon-breakdown-row.final { color: #0b4ea2; font-weight: 800; font-size: 1.02rem; border-top: 1px solid rgba(35,49,79,.1); padding-top: 8px; margin-top: 2px; }
    .button-purchase { border: 0; border-radius: 14px; padding: 13px 22px; background: #0b4ea2; color: #fff; cursor: pointer; font: inherit; font-weight: 700; font-size: 1rem; margin-top: 14px; transition: background .2s ease, transform .2s ease; }
    .button-purchase:hover:not(:disabled) { background: #0f3c7f; transform: translateY(-1px); }
    .button-purchase:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .mobile-input-row { margin-bottom: 10px; }
    .mobile-input-row input { width: 100%; border: 1px solid rgba(35,49,79,.18); border-radius: 12px; padding: 12px 14px; font: inherit; font-size: 1rem; color: #1f324f; background: #f8fbff; outline: none; transition: border-color .2s; }
    .mobile-input-row input:focus { border-color: #0b4ea2; background: #fff; }
    .mobile-input-row label { display: block; font-size: .88rem; font-weight: 700; color: #4d5f7d; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Mock Tests</h1>
          <small>Select a test from the chosen category and review exam details before starting.</small>
        </div>
      </div>
      <div class="top-actions">
        <a href="index.html">Back to categories</a>
      </div>
    </header>

    <div id="statusBar" class="status-bar">Loading category…</div>
    <section id="categoryHeader" class="category-header"></section>
    <div id="subCategoryNav" style="display:none; margin-bottom:14px;">
      <button type="button" class="button-primary" id="backToSubCategoriesBtn">← Back to Sub Categories</button>
    </div>
    <section id="testsGrid" class="tests-grid"></section>
  </div>

  <script type="module">
    import { db } from '../firebase.js';
    import { collection, doc, getDoc, getDocs, query, where, orderBy, getCountFromServer } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

    const statusBar = document.getElementById('statusBar');
    const categoryHeader = document.getElementById('categoryHeader');
    const testsGrid = document.getElementById('testsGrid');
    const subCategoryNav = document.getElementById('subCategoryNav');
    const backToSubCategoriesBtn = document.getElementById('backToSubCategoriesBtn');

    let currentCategoryId = null;
    let currentSubCategories = [];
    let currentSubCategoryCounts = [];

    // Cloudflare Worker payment backend base URL.
    const PAYMENT_API_BASE = 'https://marudhara-payment-api.jmdseller2025.workers.dev';

    // Coupon state — module-level so Purchase handler always sees latest applied coupon.
    let activeCoupon = null; // { code, originalAmount, discountAmount, paidAmount } (paise)

    function setStatus(message, type = 'info') {
      statusBar.textContent = message;
      statusBar.className = type === 'error' ? 'status-bar error' : 'status-bar';
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function showSubCategoryNav() {
      subCategoryNav.style.display = '';
    }

    function hideSubCategoryNav() {
      subCategoryNav.style.display = 'none';
    }

    function renderCategoryHeader(category) {
      const isFree = category.isFree !== false;
      const offerPrice = category.offerPrice ?? '';
      const originalPrice = category.originalPrice ?? '';
      const accessBadge = isFree
        ? '<span class="badge badge-live">Free</span>'
        : `<span class="badge">Premium — <s>₹${escapeHtml(String(originalPrice))}</s> ₹${escapeHtml(String(offerPrice))}</span>`;

      const couponAndPurchaseHtml = isFree ? '' : `
        <div class="coupon-section" id="couponSection">
          <div class="mobile-input-row">
            <label for="catMobileInput">Mobile Number</label>
            <input id="catMobileInput" type="tel" placeholder="Enter your mobile number" autocomplete="tel" maxlength="15" />
          </div>
          <label style="display:block;font-size:.88rem;font-weight:700;color:#4d5f7d;margin-bottom:6px;">Coupon Code</label>
          <div class="coupon-row">
            <input id="catCouponInput" class="coupon-input" type="text" placeholder="ENTER COUPON CODE" maxlength="50" autocomplete="off" spellcheck="false" />
            <button type="button" id="catApplyCouponBtn" class="button-coupon-apply">Apply</button>
          </div>
          <div id="catCouponMsg" class="coupon-msg"></div>
          <button type="button" id="catRemoveCouponBtn" class="button-coupon-remove" style="display:none;">✕ Remove Coupon</button>
          <div id="catCouponBreakdown" class="coupon-breakdown" style="display:none;"></div>
        </div>
        <button type="button" id="catPurchaseBtn" class="button-purchase">Purchase ₹${escapeHtml(String(offerPrice))}</button>`;

      categoryHeader.innerHTML = `
        <div class="category-summary">
          <div class="icon">${(category.image || category.icon) ? `<img src="${escapeHtml(category.image || category.icon)}" alt="${escapeHtml(category.name)} icon">` : '<div class="fallback-icon">📚</div>'}</div>
          <div class="details">
            <h2>${escapeHtml(category.name)}</h2>
            <p>${escapeHtml(category.description || 'Browse available mock tests for this category and begin your practice session.')}</p>
            <div class="badge-row">${accessBadge}</div>
            ${couponAndPurchaseHtml}
          </div>
        </div>`;
    }

    // ---- Payment backend helpers ----
    async function createOrder(payload) {
      const res = await fetch(`${PAYMENT_API_BASE}/api/create-order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Unable to create payment order. Please try again.');
      return res.json();
    }

    async function verifyPayment(payload) {
      const res = await fetch(`${PAYMENT_API_BASE}/api/verify-payment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Payment verification failed. Please try again.');
      return res.json();
    }

    function loadRazorpayScript() {
      return new Promise((resolve, reject) => {
        if (window.Razorpay) { resolve(); return; }
        const existing = document.querySelector('script[data-rzp-cat]');
        if (existing) {
          existing.addEventListener('load', () => resolve());
          existing.addEventListener('error', () => reject(new Error('Unable to load payment gateway.')));
          return;
        }
        const s = document.createElement('script');
        s.src = 'https://checkout.razorpay.com/v1/checkout.js';
        s.dataset.rzpCat = 'true';
        s.onload = () => resolve();
        s.onerror = () => reject(new Error('Unable to load payment gateway.'));
        document.body.appendChild(s);
      });
    }

    function openRazorpayCheckout(orderRes, categoryId, mobile) {
      return new Promise((resolve, reject) => {
        const razorpayKey = orderRes.keyId;
        const orderId     = orderRes.orderId;
        const amount      = orderRes.amount;
        const currency    = orderRes.currency || 'INR';
        if (!razorpayKey || !orderId || !amount) {
          reject(new Error('Payment order details are incomplete. Please try again.'));
          return;
        }
        const rzp = new window.Razorpay({
          key: razorpayKey,
          amount,
          currency,
          name: 'Marudhara Exam',
          description: 'Category Access',
          order_id: orderId,
          prefill: { contact: mobile },
          theme: { color: '#0b4ea2' },
          modal: { ondismiss: () => reject(new Error('Payment was cancelled.')) },
          handler: async function (response) {
            try {
              setStatus('Verifying payment…');
              const verifyRes = await verifyPayment({
                categoryId,
                mobile,
                razorpay_order_id:   response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature:  response.razorpay_signature
              });
              if (verifyRes && verifyRes.success) {
                resolve(verifyRes);
              } else {
                reject(new Error('Payment verification failed.'));
              }
            } catch (err) {
              reject(err);
            }
          }
        });
        rzp.on('payment.failed', () => reject(new Error('Payment failed. Please try again.')));
        rzp.open();
      });
    }

    // ---- Coupon + Purchase handlers for category header ----
    function attachCategoryPurchaseHandlers(category) {
      const isFree = category.isFree !== false;
      if (isFree) return; // no payment UI for free categories

      const mobileInput      = document.getElementById('catMobileInput');
      const couponInput      = document.getElementById('catCouponInput');
      const applyBtn         = document.getElementById('catApplyCouponBtn');
      const removeBtn        = document.getElementById('catRemoveCouponBtn');
      const couponMsgEl      = document.getElementById('catCouponMsg');
      const couponBreakdown  = document.getElementById('catCouponBreakdown');
      const purchaseBtn      = document.getElementById('catPurchaseBtn');
      const offerPrice       = category.offerPrice ?? '';

      if (!applyBtn || !purchaseBtn) return; // guard if DOM not rendered

      function setCouponMsg(text, type) {
        couponMsgEl.textContent = text;
        couponMsgEl.className = 'coupon-msg' + (type ? ' ' + type : '');
      }

      function showBreakdown(code, orig, disc, paid) {
        const fmt = p => '₹' + (p / 100).toLocaleString('en-IN');
        couponBreakdown.style.display = '';
        couponBreakdown.innerHTML =
          '<div class="coupon-breakdown-row"><span>Original Price</span><span>' + fmt(orig) + '</span></div>' +
          '<div class="coupon-breakdown-row discount"><span>Discount (' + escapeHtml(code) + ')</span><span>−' + fmt(disc) + '</span></div>' +
          '<div class="coupon-breakdown-row final"><span>Final Price</span><span>' + fmt(paid) + '</span></div>';
      }

      function hideBreakdown() {
        couponBreakdown.style.display = 'none';
        couponBreakdown.innerHTML = '';
      }

      // Auto-uppercase
      couponInput.addEventListener('input', () => {
        const pos = couponInput.selectionStart;
        couponInput.value = couponInput.value.toUpperCase();
        couponInput.setSelectionRange(pos, pos);
      });

      // Apply coupon
      let isApplying = false;
      applyBtn.addEventListener('click', async () => {
        if (isApplying) return;
        const code   = couponInput.value.trim().toUpperCase();
        const mobile = mobileInput.value.trim();
        if (!code)   { setCouponMsg('Please enter a coupon code.', 'error'); return; }
        if (!mobile) { setCouponMsg('Enter your mobile number first.', 'error'); return; }

        isApplying = true;
        applyBtn.disabled = true;
        couponInput.disabled = true;
        setCouponMsg('Validating…');

        try {
          const res = await createOrder({
            mobile,
            categoryId: category.id,
            couponCode: code,
            preview: true
          });
          if (!res || res.success !== true) {
            throw new Error((res && res.message) || 'Invalid coupon. Please try again.');
          }
          activeCoupon = { code, originalAmount: res.originalAmount, discountAmount: res.discountAmount, paidAmount: res.paidAmount };
          showBreakdown(code, res.originalAmount, res.discountAmount, res.paidAmount);
          setCouponMsg('✅ Coupon "' + code + '" applied!', 'success');
          removeBtn.style.display = '';
          applyBtn.style.display = 'none';
          couponInput.disabled = true;
          const finalRupees = (res.paidAmount / 100).toLocaleString('en-IN');
          purchaseBtn.textContent = 'Purchase ₹' + finalRupees;
        } catch (err) {
          activeCoupon = null;
          setCouponMsg((err && err.message) || 'Invalid coupon. Please try again.', 'error');
          couponInput.disabled = false;
        } finally {
          isApplying = false;
          applyBtn.disabled = false;
        }
      });

      // Remove coupon
      removeBtn.addEventListener('click', () => {
        activeCoupon = null;
        couponInput.value = '';
        couponInput.disabled = false;
        applyBtn.style.display = '';
        applyBtn.disabled = false;
        removeBtn.style.display = 'none';
        hideBreakdown();
        setCouponMsg('');
        purchaseBtn.textContent = 'Purchase ₹' + escapeHtml(String(offerPrice));
      });

      // Purchase
      purchaseBtn.addEventListener('click', async () => {
        if (purchaseBtn.dataset.processing === 'true') return;
        const mobile = mobileInput.value.trim();
        if (!mobile) {
          setStatus('Mobile number is required to purchase.', 'error');
          mobileInput.focus();
          return;
        }

        purchaseBtn.dataset.processing = 'true';
        purchaseBtn.disabled = true;
        const prevLabel = purchaseBtn.textContent;
        purchaseBtn.textContent = 'Please wait…';

        try {
          setStatus('Preparing payment…');
          await loadRazorpayScript();

          const orderPayload = activeCoupon
            ? { mobile, categoryId: category.id, couponCode: activeCoupon.code }
            : { mobile, categoryId: category.id };

          const orderRes = await createOrder(orderPayload);
          if (!orderRes || orderRes.success !== true || !orderRes.orderId) {
            throw new Error((orderRes && orderRes.message) || 'Unable to create payment order. Please try again.');
          }

          setStatus('Opening payment window…');
          const verifyRes = await openRazorpayCheckout(orderRes, category.id, mobile);
          if (!verifyRes || verifyRes.success !== true) {
            throw new Error('Payment verification failed. Please try again.');
          }

          setStatus('✅ Payment successful! You can now start any exam in this category.');
          purchaseBtn.style.display = 'none';
          document.getElementById('couponSection') && (document.getElementById('couponSection').style.display = 'none');
        } catch (err) {
          console.error('Purchase error:', err);
          setStatus(err && err.message ? err.message : 'Unable to complete purchase. Please try again.', 'error');
        } finally {
          purchaseBtn.dataset.processing = 'false';
          purchaseBtn.disabled = false;
          if (purchaseBtn.style.display !== 'none') {
            purchaseBtn.textContent = prevLabel;
          }
        }
      });
    }
    // ---- End coupon + purchase handlers ----

    // FEATURE 1 & 9: safely read liveDateTime; missing/invalid values mean the mock
    // is treated as always LIVE, so old mock documents keep working unchanged.
    function getMockLiveState(test) {
      if (!test.liveDateTime) {
        return { locked: false, liveMoment: null };
      }
      const liveMoment = new Date(test.liveDateTime);
      if (Number.isNaN(liveMoment.getTime())) {
        return { locked: false, liveMoment: null };
      }
      // FEATURE 2: locked when current time is before the mock's live date/time
      return { locked: Date.now() < liveMoment.getTime(), liveMoment };
    }

    // FEATURE 3 & 8: format a live moment as "04 Jul 2026" / "09:00 PM"
    function formatLiveMoment(liveMoment) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const day = String(liveMoment.getDate()).padStart(2, '0');
      const month = months[liveMoment.getMonth()];
      const year = liveMoment.getFullYear();
      let hours = liveMoment.getHours();
      const minutes = String(liveMoment.getMinutes()).padStart(2, '0');
      const meridiem = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12;
      if (hours === 0) hours = 12;
      const hoursLabel = String(hours).padStart(2, '0');
      return { dateLabel: `${day} ${month} ${year}`, timeLabel: `${hoursLabel}:${minutes} ${meridiem}` };
    }

    // FEATURE 7: live mocks first, then upcoming/locked mocks. Firestore query and
    // existing ordering within each group are untouched; this only re-groups the
    // already-fetched array using a stable sort.
   function sortMocksBySeries(tests) {

    return [...tests].sort((a, b) => {

        const aNo = parseInt(String(a.title || a.name || "").match(/\d+/)?.[0] || "0");

        const bNo = parseInt(String(b.title || b.name || "").match(/\d+/)?.[0] || "0");

        return aNo - bNo;

    });

}

function sortMocksByLiveStatus(tests) {

    return [...tests].sort((a, b) => {

        const aLocked = getMockLiveState(a).locked ? 1 : 0;

        const bLocked = getMockLiveState(b).locked ? 1 : 0;

        return aLocked - bLocked;

    });

}
    // FEATURE 10: used by both the direct category flow and the sub category flow,
    // so lock/badge/sort behaviour is automatically identical for both.
    function renderMockTestCards(tests) {
      return tests.map(test => {
        const title = escapeHtml(test.title || test.name || 'Unnamed test');
        const questions = Number(test.totalQuestions ?? test.questions ?? 0);
        const duration = Number(test.duration ?? test.durationMinutes ?? 0);
        const totalMarks = Number(test.totalMarks ?? test.marks ?? 0);
        const negativeMarks = Number(test.negativeMarks ?? test.penalty ?? 0);

        // FEATURE 1, 2, 9: safe lock-state read (defaults to LIVE when data is missing)
        const liveState = getMockLiveState(test);
        const locked = liveState.locked;

        // FEATURE 6: Scheduled (orange) badge only. The green "LIVE" badge
        // has been removed from this per-card badge row — it was
        // redundant with the dashboard's own dedicated "Live Mock Tests" /
        // "Upcoming Mock Tests" sections. Locked/scheduling logic itself
        // (liveState, lockNotice, button disabling/labeling below) is
        // unchanged.
        const statusBadge = locked
          ? '<span class="badge badge-locked">Scheduled</span>'
          : '';

        // FEATURE 3 & 8: locked notice with formatted live date/time
        let lockNotice = '';
        if (locked && liveState.liveMoment) {
          const { dateLabel, timeLabel } = formatLiveMoment(liveState.liveMoment);
          lockNotice = `<p>🔒 Live on<br>${dateLabel}<br>${timeLabel}</p>`;
        }

        // FEATURE 4 & 5: disable + relabel the button when locked; unchanged when live
        const questionsUnavailable = questions <= 0;
        const isDisabled = locked || questionsUnavailable;
        const buttonLabel = locked ? 'Coming Soon' : (questionsUnavailable ? 'No questions available' : 'Start exam');
        const onClickAttr = locked ? '' : ` onclick="window.location.href='confirm.html?mockId=${encodeURIComponent(test.id)}';"`;

        return `
          <article class="test-card">
            <h3>${title}</h3>
            <div class="badge-row">
              <span class="badge">Questions: ${questions}</span>
              <span class="badge">Duration: ${duration || 0} min</span>
            </div>
            <div class="badge-row">
              <span class="badge">Total Marks: ${totalMarks || 0}</span>
              <span class="badge">Negative: ${negativeMarks || 0}</span>
            </div>
            <div class="badge-row">
              ${statusBadge}
            </div>
            <p>${escapeHtml(test.description || 'Timed practice exam with one question view and live progress tracking.')}</p>
            ${lockNotice}
            <button class="button-primary" type="button" ${isDisabled ? 'disabled' : ''}${onClickAttr}>${buttonLabel}</button>
          </article>`;
      }).join('');
    }

    function renderSubCategoryCards(subCategoriesList, counts) {
      return subCategoriesList.map((sub, index) => {
        const name = escapeHtml(sub.name || 'Unnamed sub category');
        const description = escapeHtml(sub.description || 'Browse mock tests inside this sub category.');
        const count = Number(counts[index] || 0);
        return `
          <article class="test-card">
            <h3>${name}</h3>
            <div class="badge-row">
              <span class="badge">Mock Tests: ${count}</span>
            </div>
            <p>${description}</p>
            <button class="button-primary" type="button" data-subcategory-id="${escapeHtml(sub.id)}" data-subcategory-name="${escapeHtml(sub.name || '')}">Open</button>
          </article>`;
      }).join('');
    }

    async function countMockTestsInSubCategory(categoryId, subCategoryId) {
      try {
        const countQuery = query(
          collection(db, 'mockTests'),
          where('categoryId', '==', categoryId),
          where('subCategoryId', '==', subCategoryId)
        );
        const snapshot = await getCountFromServer(countQuery);
        return snapshot.data().count;
      } catch (error) {
        console.error(error);
        return 0;
      }
    }

    async function loadMockTestsForCategory(categoryId) {
      hideSubCategoryNav();
      setStatus('Loading mock tests…');
      const testsQuery = query(collection(db, 'mockTests'), where('categoryId', '==', categoryId));
      const testsSnapshot = await getDocs(testsQuery);
      console.log('mockTests snapshot size:', testsSnapshot.size);
      const tests = testsSnapshot.docs.map(docSnap => {
        console.log('Loaded mock doc:', docSnap.id, docSnap.data());
        return { id: docSnap.id, ...docSnap.data() };
      });

      if (!tests.length) {
        testsGrid.innerHTML = '<div class="empty-state">No mock tests found</div>';
        setStatus('No mock tests found.', 'error');
        return;
      }

      // FEATURE 7: live mocks first, then upcoming/locked mocks (sorted after fetch only)
testsGrid.innerHTML =
    renderMockTestCards(
        sortMocksByLiveStatus(
            sortMocksBySeries(tests)
        )
    );      setStatus('Choose a test and confirm your details before starting.');
    }

    async function loadSubCategoryList(categoryId) {
      hideSubCategoryNav();
      setStatus('Loading sub categories…');

      const subCategoryQuery = query(
        collection(db, 'mockSubCategories'),
        where('categoryId', '==', categoryId),
        orderBy('order', 'asc')
      );
      const snapshot = await getDocs(subCategoryQuery);
      currentSubCategories = snapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));

      if (!currentSubCategories.length) {
        currentSubCategoryCounts = [];
        testsGrid.innerHTML = '<div class="empty-state">No Sub Categories Found</div>';
        setStatus('No sub categories found.', 'error');
        return;
      }

      currentSubCategoryCounts = await Promise.all(
        currentSubCategories.map(sub => countMockTestsInSubCategory(categoryId, sub.id))
      );

      testsGrid.innerHTML = renderSubCategoryCards(currentSubCategories, currentSubCategoryCounts);
      setStatus('Choose a sub category to view its mock tests.');
    }

    function renderSubCategoryListFromCache() {
      hideSubCategoryNav();
      if (!currentSubCategories.length) {
        testsGrid.innerHTML = '<div class="empty-state">No Sub Categories Found</div>';
        setStatus('No sub categories found.', 'error');
        return;
      }
      testsGrid.innerHTML = renderSubCategoryCards(currentSubCategories, currentSubCategoryCounts);
      setStatus('Choose a sub category to view its mock tests.');
    }

    async function openSubCategoryTests(categoryId, subCategoryId, subCategoryName) {
      try {
        showSubCategoryNav();
        setStatus(`Loading mock tests for "${subCategoryName}"…`);

        const testsQuery = query(
          collection(db, 'mockTests'),
          where('categoryId', '==', categoryId),
          where('subCategoryId', '==', subCategoryId)
        );
        const testsSnapshot = await getDocs(testsQuery);
        const tests = testsSnapshot.docs.map(docSnap => ({ id: docSnap.id, ...docSnap.data() }));

        if (!tests.length) {
          testsGrid.innerHTML = '<div class="empty-state">No Mock Tests Found</div>';
          setStatus('No mock tests found for this sub category.', 'error');
          return;
        }

        // FEATURE 7 & 10: same live-first sort applied through the shared renderer
testsGrid.innerHTML =
    renderMockTestCards(
        sortMocksByLiveStatus(
            sortMocksBySeries(tests)
        )
    );        setStatus('Choose a test and confirm your details before starting.');
      } catch (error) {
        console.error(error);
        testsGrid.innerHTML = '<div class="empty-state">Unable to load mock tests. Try refreshing the page.</div>';
        setStatus('Failed to load tests.', 'error');
      }
    }

    async function loadCategory() {
      const categoryId = new URLSearchParams(location.search).get('id');
      console.log('categoryId:', categoryId);
      if (!categoryId) {
        setStatus('Category ID is missing.', 'error');
        testsGrid.innerHTML = '<div class="empty-state">Invalid category selection. Return to categories and choose again.</div>';
        return;
      }

      try {
        setStatus('Loading category details…');
        const categoryDoc = await getDoc(doc(db, 'mockCategories', categoryId));
        if (!categoryDoc.exists()) {
          setStatus('Category not found.', 'error');
          testsGrid.innerHTML = '<div class="empty-state">Selected category does not exist.</div>';
          return;
        }

        const category = { id: categoryDoc.id, ...categoryDoc.data() };
        currentCategoryId = category.id;
        renderCategoryHeader(category);
        attachCategoryPurchaseHandlers(category);

        if (category.hasSubCategory) {
          await loadSubCategoryList(category.id);
        } else {
          await loadMockTestsForCategory(category.id);
        }
      } catch (error) {
        console.error(error);
        testsGrid.innerHTML = '<div class="empty-state">Unable to load mock tests. Try refreshing the page.</div>';
        setStatus('Failed to load tests.', 'error');
      }
    }

    testsGrid.addEventListener('click', event => {
      const openButton = event.target.closest('[data-subcategory-id]');
      if (!openButton || !testsGrid.contains(openButton)) {
        return;
      }
      const subCategoryId = openButton.dataset.subcategoryId;
      const subCategoryName = openButton.dataset.subcategoryName || '';
      openSubCategoryTests(currentCategoryId, subCategoryId, subCategoryName);
    });

    backToSubCategoriesBtn.addEventListener('click', renderSubCategoryListFromCache);

    document.addEventListener('DOMContentLoaded', loadCategory);
  </script>
</body>
</html>
