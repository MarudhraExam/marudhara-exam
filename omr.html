<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OMR Check - मरुधरा एग्जाम</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
}

input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    background:#FF8C00;
    color:white;
    font-size:18px;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>OMR चेक करें</h1>

<label>परीक्षा चुनें</label>
<label>परीक्षा चुनें</label>

<select id="examSelect">
<option value="">परीक्षा चुनें</option>
</select>

<label>पेपर कोड चुनें</label>

<select id="paperCodeSelect">
<option value="">पहले परीक्षा चुनें</option>
</select>

<label>नाम</label>
<input type="text" id="name">

<label>रोल नंबर</label>
<input type="text" id="roll">

<button onclick="startExam()">
OMR भरना शुरू करें
</button>

OMR भरना शुरू करें
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain: "marudhara-exam.firebaseapp.com",
projectId: "marudhara-exam",
storageBucket: "marudhara-exam.firebasestorage.app",
messagingSenderId: "680152404373",
appId: "1:680152404373:web:23515d1d06c44dbd33669c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let exams = [];

async function loadExams(){

const select =
document.getElementById("examSelect");

select.innerHTML =
'<option value="">परीक्षा चुनें</option>';

const querySnapshot =
await getDocs(collection(db,"exams"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

exams.push({
id:doc.id,
...data
});

select.innerHTML +=
`<option value="${doc.id}">
${data.examName} - ${data.paperCode}
</option>`;

});

}

loadExams();

window.startExam = function(){

const examId =
document.getElementById("examSelect").value;

const name =
document.getElementById("name").value;

const roll =
document.getElementById("roll").value;

if(!examId){
alert("परीक्षा चुनें");
return;
}

if(name==="" || roll===""){
alert("नाम और रोल नंबर भरें");
return;
}

const selectedExam =
exams.find(x=>x.id===examId);

localStorage.setItem(
"studentName",
name
);

localStorage.setItem(
"rollNo",
roll
);

localStorage.setItem(
"selectedExam",
JSON.stringify(selectedExam)
);

window.location.href =
"test.html";

}

</script>

</body>
</html>
