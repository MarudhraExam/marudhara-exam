<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>मरुधरा एग्जाम - टेस्ट</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h2{
    color:#002B5B;
}

.progress{
    width:100%;
    height:20px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#FF8C00;
}

.question{
    font-size:24px;
    margin:25px 0;
}

.option{
    display:block;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
}

.btns{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}

.prev{
    background:#666;
}

.next{
    background:#FF8C00;
}
</style>
</head>

<body>

<div class="container">

<h2 id="studentInfo"></h2>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="question" id="questionText"></div>

<div id="options"></div>

<div class="btns">
<button class="prev" onclick="prevQuestion()">Previous</button>
<button class="next" onclick="nextQuestion()">Next</button>
</div>

</div>

<script>

const examData =
JSON.parse(localStorage.getItem("selectedExam"));

if(!examData){
alert("परीक्षा चुनें");
window.location.href="omr.html";
}

const answerArray =
examData.answerKey.split(",");

let answerKey = {};

answerArray.forEach((ans,index)=>{
answerKey[index+1] = ans.trim();
});

const totalQuestions =
parseInt(examData.totalQuestions);

let current = 1;
let answers = {};

document.getElementById("studentInfo").innerHTML =
examData.examName +
" | Paper : " +
examData.paperCode +
"<br><br>" +
(localStorage.getItem("studentName") || "") +
" | Roll No : " +
(localStorage.getItem("rollNo") || "");

function loadQuestion(){

document.getElementById("questionText").innerHTML =
"प्रश्न " + current + " / " + totalQuestions;

document.getElementById("bar").style.width =
(current/totalQuestions*100)+"%";

let html = "";

["A","B","C","D","E"].forEach(option=>{

html += `
<label class="option">
<input type="radio"
name="answer"
value="${option}"
${answers[current]===option?"checked":""}>
${option}
</label>
`;

});

document.getElementById("options").innerHTML = html;
}

function saveAnswer(){

const selected =
document.querySelector('input[name="answer"]:checked');

if(selected){
answers[current] = selected.value;
}
}

function nextQuestion(){

saveAnswer();

if(current < totalQuestions){

current++;
loadQuestion();

}else{

let correct = 0;
let wrong = 0;
let skipped = 0;

for(let i=1;i<=totalQuestions;i++){

if(!answers[i]){
skipped++;
}
else if(answers[i] === answerKey[i]){
correct++;
}
else{
wrong++;
}

}

localStorage.setItem("correct",correct);
localStorage.setItem("wrong",wrong);
localStorage.setItem("skipped",skipped);
localStorage.setItem("answers",JSON.stringify(answers));

localStorage.setItem(
"examName",
examData.examName
);

localStorage.setItem(
"paperCode",
examData.paperCode
);

localStorage.setItem(
"correctMarks",
examData.correctMarks
);

localStorage.setItem(
"negativeMarks",
examData.negativeMarks
);

window.location.href="result.html";

}
}

function prevQuestion(){

saveAnswer();

if(current>1){
current--;
loadQuestion();
}

}

loadQuestion();

</script>

</body>
</html>
```
