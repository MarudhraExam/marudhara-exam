<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mock Exam Result</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; background: #f4f7fb; color: #1f324f; }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(180deg,#f8fbff 0%,#edf2f8 100%); }
    body, button { font: inherit; }
    a { color: inherit; text-decoration: none; }
    .page-shell { max-width: 1100px; margin: 0 auto; padding: 24px 18px 32px; }
    header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: center; margin-bottom: 24px; }
    .brand { display: flex; gap: 14px; align-items: center; }
    .brand .logo { width: 52px; height: 52px; display: grid; place-items: center; border-radius: 18px; background: #0b4ea2; color: #fff; font-weight: 800; }
    .brand h1 { margin: 0; font-size: 1.9rem; }
    .brand small { display: block; color: #5f6f8f; margin-top: 2px; }
    .top-actions a { border-radius: 999px; padding: 12px 18px; background: #0b4ea2; color: #fff; }
    .top-actions a:hover { background: #0f3c7f; }
    .language-switcher { display: inline-flex; align-items: center; gap: 8px; margin-right: 10px; }
    .language-switcher label { font-size: 0.95rem; color: #fff; }
    .language-select { font-size: 1rem; padding: 8px 12px; border-radius: 12px; border: 1px solid rgba(35,49,79,.2); background: #fff; color: #102a52; }
    .status-bar { margin-bottom: 24px; padding: 14px 18px; border-radius: 18px; background: #eef4ff; color: #102a52; font-weight: 600; }
    .status-bar.error { background: #ffe7e6; color: #8a1f19; }
    .result-grid { display: grid; gap: 20px; }
    .card-grid { display: grid; gap: 20px; grid-template-columns: minmax(0,1.2fr) 360px; }
    .card { background: #fff; border: 1px solid rgba(35,49,79,.1); border-radius: 24px; padding: 24px; }
    .card h2 { margin-top: 0; }
    .summary-block { display: grid; gap: 14px; margin-top: 18px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 14px 16px; border-radius: 18px; background: #f5f8ff; }
    .summary-row strong { font-size: 0.98rem; }
    .summary-large { font-size: 3rem; line-height: 1; }
    .badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: #eef4ff; color: #0b4ea2; font-weight: 700; }
    .details-list { display: grid; gap: 12px; margin-top: 18px; }
    .details-item { display: flex; justify-content: space-between; gap: 12px; padding: 14px 16px; border-radius: 18px; background: #fbfbfb; }
    .details-item strong { color: #102a52; }
    .neutral-note { margin: 0; padding: 16px 18px; border-radius: 18px; background: #eef4ff; color: #0b4ea2; }
    .empty-state { padding: 32px 24px; border-radius: 24px; background: #fff; border: 1px dashed rgba(35,49,79,.15); color: #556180; text-align: center; }
    .action-row { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 22px; }
    .button-primary, .button-secondary { border: 0; border-radius: 14px; padding: 12px 18px; cursor: pointer; transition: background .2s ease, color .2s ease; }
    .button-primary { background: #0b4ea2; color: #fff; }
    .button-secondary { background: #eef2ff; color: #0b4ea2; }
    .button-primary:hover { background: #0f3c7f; }
    .button-secondary:hover { background: #dce6ff; }
    .button-primary:disabled { opacity: .6; cursor: not-allowed; }
    .button-secondary.active { background: #0b4ea2; color: #fff; }
    .review-section { padding-bottom: 0; }
    .analysis-panel { display: flex; flex-direction: column; gap: 18px; }
    .analysis-header { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 18px; align-items: flex-start; }
    .analysis-header h2 { margin: 0; }
    .analysis-legend { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .legend-chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; border-radius: 999px; background: #fff; border: 1px solid rgba(35,49,79,.12); color: #22355d; font-weight: 700; font-size: .95rem; }
    .legend-bullet { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .legend-correct { background: #33b34a; }
    .legend-wrong { background: #f64b4b; }
    .legend-unattempted { background: #3f7ffc; }
    .summary-grid { display: grid; gap: 14px; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); }
    .summary-card { display: flex; flex-direction: column; justify-content: space-between; gap: 10px; padding: 18px; border-radius: 20px; border: 1px solid rgba(35,49,79,.12); background: #fff; color: #102a52; text-align: left; cursor: pointer; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; min-height: 110px; }
    .summary-card:hover, .summary-card.active { transform: translateY(-2px); box-shadow: 0 18px 30px rgba(24,52,95,.09); border-color: rgba(11,78,162,.22); }
    .summary-card strong { font-size: .92rem; color: #5f6f8f; }
    .summary-card .summary-value { font-size: 1.8rem; line-height: 1; font-weight: 800; }
    .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .filter-button { border: 1px solid rgba(35,49,79,.12); background: #fff; color: #102a52; padding: 11px 18px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: transform .18s ease, background .2s ease, border-color .2s ease; }
    .filter-button:hover { transform: translateY(-1px); }
    .filter-button.active { background: #0b4ea2; color: #fff; border-color: #0b4ea2; }
    .question-palette { display: grid; grid-template-columns: repeat(auto-fit, minmax(42px, 1fr)); gap: 10px; padding: 8px 0; justify-items: center; max-height: 360px; overflow-y: auto; }
    .question-pill { width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; border: 2px solid transparent; font-weight: 700; font-size: .95rem; cursor: pointer; transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease; color: #fff; background: #3f7ffc; outline: none; }
    .question-pill:hover { transform: scale(1.06); box-shadow: 0 12px 22px rgba(30,57,105,.16); }
    .question-pill.active { border-color: #0b4ea2; box-shadow: 0 0 0 4px rgba(11,78,162,.18); }
    .question-pill.correct { background: #33b34a; }
    .question-pill.wrong { background: #f64b4b; }
    .question-pill.unattempted { background: #3f7ffc; }
    .question-pill[hidden] { display: none !important; }
    .question-review-panel { margin-top: 22px; }
    .question-review-card { background: #fff; border-radius: 28px; border: 1px solid rgba(35,49,79,.12); box-shadow: 0 22px 50px rgba(42,74,123,.08); padding: 26px; transition: opacity .24s ease, transform .24s ease; }
    .question-review-card.fade-in { animation: fadeInCard .24s ease both; }
    .review-meta { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 18px; }
    .review-meta-left { min-width: 180px; }
    .question-label { color: #5f6f8f; font-size: .9rem; margin-bottom: 8px; }
    .question-text { margin: 0; color: #162e56; line-height: 1.8; font-weight: 700; white-space: pre-wrap; }
    .review-status-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .status-pill { display: inline-flex; align-items: center; justify-content: center; padding: 10px 14px; border-radius: 999px; font-weight: 700; font-size: .86rem; text-transform: uppercase; letter-spacing: .01em; }
    .status-correct { background: #e6f8eb; color: #077a37; }
    .status-wrong { background: #ffe7e7; color: #961f1f; }
    .status-unattempted { background: #eef2ff; color: #0b4ea2; }
    .question-asset { width: 100%; max-height: 340px; object-fit: contain; border-radius: 20px; margin: 20px 0; }
    .options-grid { display: grid; gap: 12px; margin-top: 18px; }
    .option-chip { position: relative; display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-radius: 18px; background: #f8f9fd; border: 1px solid rgba(35,49,79,.12); color: #1c3154; min-height: 68px; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; }
    .option-chip:hover { transform: translateY(-1px); box-shadow: 0 12px 24px rgba(20,42,85,.1); }
    .option-chip.correct, .option-chip.selected-correct { background: #e9f8ef; border-color: #8bd5a1; color: #0f4a2c; }
    .option-chip.selected-wrong { background: #ffecee; border-color: #f39a9a; color: #7f2424; }
    .option-chip.unattempted { background: #eef4ff; border-color: #bdd2ff; color: #1f3f7a; }
    .option-label { min-width: 40px; min-height: 40px; display: grid; place-items: center; border-radius: 50%; background: #dbe6ff; color: #0b4ea2; font-weight: 700; }
    .option-chip.correct .option-label, .option-chip.selected-correct .option-label { background: #26a74b; color: #fff; }
    .option-chip.selected-wrong .option-label { background: #d33f3f; color: #fff; }
    .option-chip.unattempted .option-label { background: #2f7ffc; color: #fff; }
    .option-text { flex: 1; font-size: .96rem; line-height: 1.7; word-break: break-word; }
    .option-icon { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: rgba(255,255,255,.85); font-size: .9rem; color: #102a52; }
    .option-chip.correct .option-icon, .option-chip.selected-correct .option-icon { background: #26a74b; color: #fff; }
    .option-chip.selected-wrong .option-icon { background: #d33f3f; color: #fff; }
    .option-chip.unattempted .option-icon { background: #2f7ffc; color: #fff; }
    .review-stats { display: grid; gap: 10px; margin-top: 24px; padding: 20px; border-radius: 22px; background: #f7fbff; border: 1px solid rgba(11,78,162,.14); }
    .review-stats div { display: flex; justify-content: space-between; gap: 12px; color: #22355d; }
    .review-stats strong { font-weight: 700; }
    .question-explanation { margin-top: 24px; padding: 22px; border-radius: 22px; background: #fff; border: 1px solid rgba(35,49,79,.08); }
    .question-explanation h4 { margin: 0 0 14px; font-size: 1rem; color: #102a52; }
    .question-explanation > *:not(:first-child) { margin-top: 12px; }
    .question-explanation img { max-width: 100%; height: auto; border-radius: 16px; display: block; }
    .question-explanation table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .question-explanation th, .question-explanation td { padding: 10px 12px; border: 1px solid rgba(46,68,101,.12); text-align: left; }
    .question-explanation blockquote { padding: 14px 18px; border-left: 4px solid #0b4ea2; background: #eef5ff; color: #1d365f; margin: 0; }
    .nav-controls { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
    .nav-controls button { min-width: 130px; border: 1px solid rgba(35,49,79,.14); background: #fff; color: #102a52; padding: 12px 18px; border-radius: 16px; cursor: pointer; transition: transform .18s ease, background .2s ease; }
    .nav-controls button:hover { background: #eef4ff; transform: translateY(-1px); }
    .nav-controls button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .question-pill.correct { background: #33b34a; }
    .question-pill.wrong { background: #f64b4b; }
    .question-pill.unattempted { background: #3f7ffc; }
    .question-pill:focus-visible,
    .filter-button:focus-visible,
    .summary-card:focus-visible,
    .nav-controls button:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(11,78,162,.24); }
    @keyframes fadeInCard { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 920px) { .card-grid { grid-template-columns: 1fr; } .analysis-header { flex-direction: column; } .question-palette { grid-template-columns: repeat(auto-fit, minmax(34px, 1fr)); } }
    @media (max-width: 720px) { .options-grid { grid-template-columns: 1fr; } .analysis-header { gap: 12px; } .summary-card { min-height: auto; } .question-palette { grid-template-columns: repeat(auto-fit, minmax(30px, 1fr)); } }
    @media (max-width: 560px) { .filter-bar { justify-content: stretch; } .filter-button { flex: 1 1 100%; } }
    @media (min-width: 680px) { .options-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Exam result</h1>
          <small>Review your performance and return to practice more mock tests.</small>
        </div>
      </div>
      <div class="top-actions">
        <div class="language-switcher">
          <label for="languageSelect">Language</label>
          <select id="languageSelect" class="language-select" aria-label="Language">
            <option value="hi">हिन्दी</option>
            <option value="en">English</option>
          </select>
        </div>
        <a href="index.html">Back to categories</a>
      </div>
    </header>

    <div id="statusBar" class="status-bar">Loading result summary…</div>
    <div id="resultContent" class="result-grid"></div>
  </div>

  <!-- ===== Question Paper PDF feature: external libraries (added, nothing existing removed) ===== -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="module">
    import { db } from '../firebase.js';
    import {
      doc,
      getDoc,
      collection,
      getDocs,
      query,
      where,
      orderBy,
      addDoc,
      Timestamp
    } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

    const statusBar = document.getElementById('statusBar');
    const resultContent = document.getElementById('resultContent');
    const languageSelect = document.getElementById('languageSelect');
    const languageKey = 'mockExamLanguage';

    function setStatus(message, type = 'info') {
      statusBar.textContent = message;
      statusBar.className = type === 'error' ? 'status-bar error' : 'status-bar';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function formatSeconds(seconds) {
      if (seconds == null || Number.isNaN(seconds)) return 'N/A';
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins}m ${secs}s`;
    }

    function getSavedLanguage() {
      const stored = localStorage.getItem(languageKey);
      return stored === 'en' ? 'en' : 'hi';
    }

    function saveLanguage(lang) {
      localStorage.setItem(languageKey, lang === 'en' ? 'en' : 'hi');
    }

    function getLocalizedField(question, fieldBase) {
      const lang = getSavedLanguage();
      const english = String(question[`${fieldBase}English`] || '').trim();
      const hindi = String(question[`${fieldBase}Hindi`] || '').trim();
      const fallback = String(question[fieldBase] || '').trim();
      if (lang === 'en') {
        return english || hindi || fallback;
      }
      return hindi || fallback;
    }

    function normalizeAnswer(value) {
      return String(value || '').trim().toUpperCase();
    }

    function formatQuestionText(raw) {
      return String(raw || '')
        .replace(/\\r\\n/g, '\n')
        .replace(/\\n/g, '\n')
        .replace(/\r\n/g, '\n');
    }

    async function fetchCategoryName(categoryId) {
      if (!categoryId) return 'Unknown Category';
      try {
        const categoryDoc = await getDoc(doc(db, 'mockCategories', categoryId));
        if (!categoryDoc.exists()) return 'Unknown Category';
        const category = categoryDoc.data();
        return category?.name || category?.title || 'Unknown Category';
      } catch (error) {
        console.error('Category lookup failed:', error);
        return 'Unknown Category';
      }
    }

    function T() {
      return getSavedLanguage() === 'en'
        ? {
            score: "Score",
            percentage: "Percentage",
            correct: "Correct",
            wrong: "Wrong",
            attempted: "Attempted",
            unattempted: "Unattempted",
            questions: "Questions",
            totalQuestions: "Total Questions",
            timeTaken: "Time Taken",
            remainingTime: "Remaining Time",
            submitted: "Submitted On",
            details: "Details",
            mockTitle: "Mock Title",
            category: "Category",
            name: "Name",
            roll: "Roll Number",
            returnBtn: "Return to Categories",
            printBtn: "Print Result"
          }
        : {
            score: "अंक",
            percentage: "प्रतिशत",
            correct: "सही",
            wrong: "गलत",
            attempted: "प्रयास किए",
            unattempted: "अनुत्तरित",
            questions: "प्रश्न",
            totalQuestions: "कुल प्रश्न",
            timeTaken: "लिया गया समय",
            remainingTime: "शेष समय",
            submitted: "जमा करने का समय",
            details: "विवरण",
            mockTitle: "मॉक टेस्ट",
            category: "श्रेणी",
            name: "नाम",
            roll: "रोल नंबर",
            returnBtn: "श्रेणियों पर जाएँ",
            printBtn: "प्रिंट रिजल्ट"
          };
    }

    function renderSummary(result, categoryName, rankInfo = { rank: 1, total: 1 }) {
      const t = T();
      const studentName = result.name || result.studentName || 'Unknown';
      const mockTitle = result.mockTitle || 'Mock exam';
      const score = result.score ?? 0;
      const correct = result.correct ?? 0;
      const wrong = result.wrong ?? 0;
      const attempted = result.attempted ?? 0;
      const unattempted = result.unattempted ?? 0;
      const totalQuestions = result.totalQuestions ?? (Array.isArray(result.questions) ? result.questions.length : undefined) ?? result.questionCount ?? 0;
      const totalMarks = (result.positiveMarks || 1) * totalQuestions;
      console.log("Score:", score);
      console.log("Positive Marks:", result.positiveMarks);
      console.log("Total Questions:", totalQuestions);
      console.log("Total Marks:", totalMarks);
      const percentage = totalMarks > 0 ? ((score / totalMarks) * 100).toFixed(2) : '0.00';
      const timeTaken = formatSeconds(result.timeTakenSeconds ?? result.timeTaken);
      const remainingTime = formatSeconds(result.timeRemainingSeconds ?? result.remainingTime);
      const submittedAt = result.submittedAt ? new Date(result.submittedAt).toLocaleString() : 'N/A';
      const studentLabel = rankInfo.total === 1 ? 'Student' : 'Students';

      return `
        <div class="card">
          <h2>${escapeHtml(mockTitle)}</h2>
         <p class="neutral-note">${escapeHtml(studentName)}</p>
          <div class="summary-block">
            <div class="summary-row"><strong>Score</strong><span class="summary-large">${score}</span></div>
            <div class="summary-row"><strong>${t.score}</strong><span>${percentage}%</span></div>
            <div class="summary-row"><strong>${t.correct}</strong><span>${correct}</span></div>
            <div class="summary-row"><strong>${t.wrong}</strong><span>${wrong}</span></div>
            <div class="summary-row"><strong>${t.attempted}</strong><span>${attempted}</span></div>
            <div class="summary-row"><strong>${t.unattempted}</strong><span>${unattempted}</span></div>
            <div class="summary-row"><strong>${t.questions}</strong><span>${totalQuestions}</span></div>
            <div class="summary-row"><strong>${t.timeTaken}</strong><span>${escapeHtml(timeTaken)}</span></div>
            <div class="summary-row"><strong>${t.remainingTime}</strong><span>${escapeHtml(remainingTime)}</span></div>
            <div class="summary-row"><strong>${t.submitted}</strong><span>${escapeHtml(submittedAt)}</span></div>
          </div>
          <div class="action-row">
            <button class="button-primary" type="button" onclick="window.location.href='index.html'">Return to categories</button>
            <button class="button-secondary" type="button" onclick="window.print()">Print result</button>
            <button class="button-primary" type="button" id="downloadQuestionPaperBtn">Download Question Paper</button>
          </div>
        </div>
        <div class="card">
          <h2>🏆 Overall Rank</h2>
          <div class="summary-block">
            <div class="summary-row"><strong>#${rankInfo.rank}</strong><span></span></div>
            <div class="summary-row"><strong>Out of</strong><span>${rankInfo.total} ${studentLabel}</span></div>
          </div>
        </div>
        <div class="card">
          <h2>Details</h2>
          <div class="details-list">
            <div class="details-item"><strong>${t.mockTitle}</strong><span>${escapeHtml(mockTitle)}</span></div>
            <div class="details-item"><strong>${t.category}</strong><span>${escapeHtml(categoryName)}</span></div>
            <div class="details-item"><strong>${t.name}</strong><span>${escapeHtml(studentName)}</span></div>
          </div>
        </div>`;
    }

    async function fetchQuestions(mockId) {
      if (!mockId) return [];
      const questionsRef = collection(db, 'mockQuestions');
      const questionsQuery = query(questionsRef, where('mockId', '==', mockId), orderBy('questionNo', 'asc'));
      const querySnapshot = await getDocs(questionsQuery);
      
      console.log("Searching Mock ID:", mockId);
      console.log("Documents Found:", querySnapshot.size);

      const items = [];
      querySnapshot.forEach((docSnapshot) => {
        console.log("Question Doc:", docSnapshot.id, docSnapshot.data());
        const data = docSnapshot.data();
        items.push({
          id: docSnapshot.id,
          question: data.question || '',
          questionHindi: data.questionHindi || data.question || '',
          questionEnglish: data.questionEnglish || '',
          optionA: data.optionA || '',
          optionAHindi: data.optionAHindi || data.optionA || '',
          optionAEnglish: data.optionAEnglish || '',
          optionB: data.optionB || '',
          optionBHindi: data.optionBHindi || data.optionB || '',
          optionBEnglish: data.optionBEnglish || '',
          optionC: data.optionC || '',
          optionCHindi: data.optionCHindi || data.optionC || '',
          optionCEnglish: data.optionCEnglish || '',
          optionD: data.optionD || '',
          optionDHindi: data.optionDHindi || data.optionD || '',
          optionDEnglish: data.optionDEnglish || '',
          optionE: data.optionE || '',
          optionEHindi: data.optionEHindi || data.optionE || '',
          optionEEnglish: data.optionEEnglish || '',
          answer: data.answer || data.correctAnswer || data.correctOption || '',
          explanation: data.explanation || '',
          explanationHindi: data.explanationHindi || data.explanation || '',
          explanationEnglish: data.explanationEnglish || '',
          image: data.image || '',
          questionNo: data.questionNo ?? 0,
          mockId: data.mockId || mockId
        });
      });
      return items;
    }

    function normalizeSubmissionTime(value) {
      if (!value) return Number.MAX_SAFE_INTEGER;
      if (typeof value === 'number') return value;
      if (value instanceof Date) return value.getTime();
      if (value?.toMillis) return value.toMillis();
      const parsed = Date.parse(value);
      return Number.isNaN(parsed) ? Number.MAX_SAFE_INTEGER : parsed;
    }

    async function fetchOverallRank(mockId, currentResultId) {
      if (!mockId) return { rank: 1, total: 1 };
      try {
        const resultsQuery = query(collection(db, 'mockResults'), where('mockId', '==', mockId));
        const snapshot = await getDocs(resultsQuery);
        const allResults = [];
        snapshot.forEach((docSnapshot) => {
          const data = docSnapshot.data();
          allResults.push({
            id: docSnapshot.id,
            score: Number(data.score ?? 0),
            submittedAt: normalizeSubmissionTime(data.submittedAt)
          });
        });

        allResults.sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          return a.submittedAt - b.submittedAt;
        });

        const total = allResults.length;
        const position = allResults.findIndex((item) => item.id === currentResultId);
        return { rank: position >= 0 ? position + 1 : total || 1, total: total || 1 };
      } catch (error) {
        console.error('Rank lookup failed:', error);
        return { rank: 1, total: 1 };
      }
    }

    // sessionStorage key prefix used to guard against duplicate attempt saves
    // on page refresh. Keyed by resultId so each completed exam (one unique
    // mockResults document) maps to exactly one saved attempt record.
    const attemptSaveKeyPrefix = 'examAttemptSaved_';

    // --- FEATURE 1, 2, 3, 4, 6: Save one attempt record per completed exam ---
    // Writes a dedicated attempt document (separate collection, never
    // overwritten) so admins can later compute totals/averages/highest score
    // without touching existing mockResults data. Safe to call on every page
    // load: it no-ops if this resultId was already saved in this session,
    // and never throws if the Firestore write fails.
    async function saveAttemptRecord(result, resultId) {
      const guardKey = `${attemptSaveKeyPrefix}${resultId}`;

      // FEATURE 3: Prevent duplicate save when the result page is refreshed.
      if (sessionStorage.getItem(guardKey)) {
        return;
      }

      try {
        // Reuse the same totalMarks/percentage formula used in renderSummary
        // so the saved attempt numbers match what the student sees on screen.
        const totalQuestions = result.totalQuestions ?? (Array.isArray(result.questions) ? result.questions.length : undefined) ?? result.questionCount ?? 0;
        const totalMarks = (result.positiveMarks || 1) * totalQuestions;
        const score = result.score ?? 0;
        const percentage = result.percentage ?? (totalMarks > 0 ? Number(((score / totalMarks) * 100).toFixed(2)) : 0);

        await addDoc(collection(db, 'examAttempts'), {
          mockId: result.mockId || '',
          mockTitle: result.mockTitle || 'Mock exam',
          studentName: result.name || result.studentName || 'Unknown',
          studentId: result.studentId || result.uid || result.mobile || '',
          submitTime: result.submittedAt || new Date().toISOString(),
          score,
          totalMarks,
          percentage,
          correctAnswers: result.correct ?? 0,
          wrongAnswers: result.wrong ?? 0,
          unanswered: result.unattempted ?? 0,
          status: 'completed',
          resultId: resultId,
          createdAt: Timestamp.now()
        });

        // Mark this resultId as saved so a refresh won't create another attempt.
        sessionStorage.setItem(guardKey, '1');
      } catch (error) {
        // FEATURE 6: Never break result display if the Firestore write fails.
        console.error('Failed to save attempt record:', error);
      }
    }

    const pageState = {
      questions: [],
      answers: {},
      activeFilter: 'All',
      selectedQuestionIndex: 0

    // ===== Question Paper PDF feature: state holder (isolated, does not touch pageState) =====

      result: null,

    function getQuestionStatus(question, answers) {
      const studentAnswer = normalizeAnswer(answers?.[question.id] ?? '');
      const correctAnswer = normalizeAnswer(question.answer || '');
      if (!studentAnswer) return 'Unattempted';
      return studentAnswer === correctAnswer ? 'Correct' : 'Wrong';
    }

    function getPaletteStats(questions, answers) {
      const stats = { total: questions.length, correct: 0, wrong: 0, unattempted: 0 };
      questions.forEach((question) => {
        const status = getQuestionStatus(question, answers);
        if (status === 'Correct') stats.correct += 1;
        else if (status === 'Wrong') stats.wrong += 1;
        else stats.unattempted += 1;
      });
      stats.attempted = stats.total - stats.unattempted;
      return stats;
    }

    function renderSummaryCards(stats, result) {
      const t = T();
      const totalQuestions = stats.total;
      const score = result.score ?? 0;
      const totalMarks = (result.positiveMarks || 1) * totalQuestions;
      const percentage = totalMarks > 0 ? ((score / totalMarks) * 100).toFixed(2) : '0.00';
      const cards = [
        { label: t.totalQuestions || 'Total Questions', value: totalQuestions, filter: 'All' },
        { label: t.correct, value: stats.correct, filter: 'Correct' },
        { label: t.wrong, value: stats.wrong, filter: 'Wrong' },
        { label: t.unattempted, value: stats.unattempted, filter: 'Unattempted' },
        { label: t.score, value: score, filter: 'All' },
        { label: t.percentage, value: `${percentage}%`, filter: 'All' }
      ];

      return cards
        .map((card) => `
          <button type="button" class="summary-card ${pageState.activeFilter === card.filter ? 'active' : ''}" data-filter="${card.filter}" aria-label="${card.label}">

        .join('');

    function buildOptionHtml(letter, optionText, status) {
      const text = optionText ? escapeHtml(optionText) : '—';
      const classes = ['option-chip'];
      let icon = '';
      if (status === 'correct') {
        classes.push('correct');
        icon = '✔';
      }
      if (status === 'selected-correct') {
        classes.push('selected-correct');
        icon = '✓';
      }
      if (status === 'selected-wrong') {
        classes.push('selected-wrong');
        icon = '✕';
      }
      if (status === 'unattempted') {
        classes.push('unattempted');
      }

      return `
        <div class="${classes.join(' ')}" role="group" aria-label="Option ${letter} ${status}">
          <span class="option-label">${letter}</span>
          <span class="option-text">${text}</span>
          <span class="option-icon">${icon}</span>
        </div>`;

    // Helper function to handle formatting of explanations (allows safe nested HTML tags if specified in Firestore explanation field)
    function renderHtmlContent(raw) {
      if (!raw) return '';

    // Fixed functional logic rendering single selected question cards matching container selector needs
    function renderReviewCard(question, index, total, answers) {
      const studentAnswer = normalizeAnswer(answers?.[question.id] ?? '');
      const correctAnswer = normalizeAnswer(question.answer || '');
      const status = !studentAnswer ? 'Unattempted' : studentAnswer === correctAnswer ? 'Correct' : 'Wrong';
      const optionsHtml = ['A', 'B', 'C', 'D', 'E']
        .map((letter) => {
          const optionText = getLocalizedField(question, `option${letter}`) || '';
          if (!optionText && letter === 'E') return ''; // Skip empty option E
          let optionStatus = '';
          const isSelected = studentAnswer === letter;
          const isCorrect = correctAnswer === letter;

          if (!studentAnswer) {
            optionStatus = 'unattempted';
          } else if (isCorrect && isSelected) {
            optionStatus = 'selected-correct';
          } else if (isCorrect) {
            optionStatus = 'correct';
          } else if (isSelected) {
            optionStatus = 'selected-wrong';
          }

          return buildOptionHtml(letter, optionText, optionStatus);
        })
        .join('');

      const explanationHtml = renderHtmlContent(getLocalizedField(question, 'explanation'));

      return `
        <article class="question-review-card fade-in" aria-live="polite">
          <div class="review-meta">
            <div class="review-meta-left">
              <div class="question-label">Question ${index + 1} of ${total}</div>

    function renderReviewSection(questions, answers, result) {

              <button type="button" class="filter-button" data-filter="Correct" aria-pressed="false">Correct</button>
              <button type="button" class="filter-button" data-filter="Wrong" aria-pressed="false">Wrong</button>

    function updateFilterButtons(filter) {
      pageState.activeFilter = filter;
      document.querySelectorAll('.filter-button').forEach((button) => {
        const isActive = button.dataset.filter === filter;
        button.classList.toggle('active', isActive);
        button.setAttribute('aria-pressed', String(isActive));

      document.querySelectorAll('.summary-card').forEach((button) => {
        const isActive = button.dataset.filter === filter;
        button.classList.toggle('active', isActive);
      });

    function renderQuestionPalette() {
      const palette = document.getElementById('questionPalette');
      if (!palette) return;
      palette.innerHTML = pageState.questions
        .map((question, index) => {
          const status = getQuestionStatus(question, pageState.answers);
          const isSelected = index === pageState.selectedQuestionIndex;
          const visible = pageState.activeFilter === 'All' || status === pageState.activeFilter;
          return `
            <button
              type="button"
              class="question-pill ${status.toLowerCase()}${isSelected ? ' active' : ''}"
              data-index="${index}"
              data-status="${status}"
              aria-label="Question ${index + 1}, ${status}"
              aria-pressed="${isSelected}"
              ${visible ? '' : 'hidden'}>
              ${index + 1}
            </button>`;
        })
        .join('');

    function renderQuestionReview() {
      const container = document.getElementById('questionReviewContainer');
      if (!container) return;
      const question = pageState.questions[pageState.selectedQuestionIndex];
      if (!question) {
        container.innerHTML = '<div class="empty-state">Select a question to review its details.</div>';
        return;
      }
      const status = getQuestionStatus(question, pageState.answers);
      if (pageState.activeFilter !== 'All' && status !== pageState.activeFilter) {
        container.innerHTML = '<div class="empty-state">No questions match the selected filter.</div>';
        return;
      }
      container.innerHTML = renderReviewCard(question, pageState.selectedQuestionIndex, pageState.questions.length, pageState.answers);
      document.getElementById('prevQuestionBtn')?.addEventListener('click', () => selectQuestion(pageState.selectedQuestionIndex - 1));
      document.getElementById('nextQuestionBtn')?.addEventListener('click', () => selectQuestion(pageState.selectedQuestionIndex + 1));
    }

    function selectQuestion(index, options = { scroll: true }) {
      if (index < 0 || index >= pageState.questions.length) return;
      pageState.selectedQuestionIndex = index;
      renderQuestionPalette();
      renderQuestionReview();
      if (options.scroll) {
        document.getElementById('questionReviewContainer')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function applyFilter(filter) {
      updateFilterButtons(filter);
      const visibleQuestions = pageState.questions.filter((question) => {
        const status = getQuestionStatus(question, pageState.answers);
        return filter === 'All' || status === filter;
      });
      if (visibleQuestions.length && !visibleQuestions.some((question) => pageState.questions[pageState.selectedQuestionIndex] === question)) {
        pageState.selectedQuestionIndex = pageState.questions.indexOf(visibleQuestions[0]);
      }
      renderQuestionPalette();
      renderQuestionReview();
    }

    function handlePaletteClick(event) {
      const button = event.target.closest('.question-pill');
      if (!button || !button.dataset.index) return;
      selectQuestion(Number(button.dataset.index));
    }

    function handleFilterBarClick(event) {
      const button = event.target.closest('.filter-button, .summary-card');
      if (!button || !button.dataset.filter) return;
      applyFilter(button.dataset.filter);
    }

    function handleKeyboardNavigation(event) {
      if (event.defaultPrevented) return;
      if (event.key === 'ArrowLeft') {
        selectQuestion(Math.max(0, pageState.selectedQuestionIndex - 1));
      } else if (event.key === 'ArrowRight') {
        selectQuestion(Math.min(pageState.questions.length - 1, pageState.selectedQuestionIndex + 1));
      } else {
        return;
      }
      event.preventDefault();
    }

    function initializeQuestionAnalysis(questions, answers) {
      pageState.questions = questions;
      pageState.answers = answers;
      pageState.activeFilter = 'All';
      pageState.selectedQuestionIndex = 0;
      renderQuestionPalette();
      renderQuestionReview();
      document.querySelector('.analysis-panel')?.addEventListener('click', handleFilterBarClick);
      document.getElementById('questionPalette')?.addEventListener('click', handlePaletteClick);
      document.removeEventListener('keydown', handleKeyboardNavigation);
      document.addEventListener('keydown', handleKeyboardNavigation);

        await saveAttemptRecord(result, resultId);

        const rankInfo = await fetchOverallRank(result.mockId, result.id);

console.log("Questions Loaded:", questions.length);
console.log("Questions:", questions);
console.log("Result Answers:", result.answers);
console.log("Rank Info:", rankInfo);

const answers =
    result.answers && typeof result.answers === "object"

        resultContent.innerHTML = `

       QUESTION PAPER PDF FEATURE (fully isolated — new code only, nothing above is modified)

    function sanitizeFilenamePart(value) {
      return String(value || 'Mock')
        .replace(/[\\/:*?"<>|]+/g, '')
        .replace(/\s+/g, '_')
        .trim() || 'Mock';
    }

    // Loads an image URL into a data URL + returns natural dimensions,
    // so it can be embedded in the PDF with correct aspect ratio.
    function loadImageAsDataUrl(url) {
      return new Promise((resolve) => {
        if (!url) { resolve(null); return; }
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          try {
            const canvas = document.createElement('canvas');
            canvas.width = img.naturalWidth;
            canvas.height = img.naturalHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            resolve({ dataUrl, width: img.naturalWidth, height: img.naturalHeight });
          } catch (error) {
            console.error('Image canvas conversion failed:', error);
            resolve(null);
          }
        };
        img.onerror = () => resolve(null);
        img.src = url;
      });
    }

    // Returns the Hindi and English text for a given field base (e.g. "question", "optionA"),
    // reading the same "{base}Hindi" / "{base}English" fields the rest of the page already
    // uses via getLocalizedField(). Falls back to a single untagged field if that's all the
    // question document has, so older question records still render correctly.
    function getBilingualField(question, base) {
      const english = String(question[`${base}English`] || '').trim();
      const hindi = String(question[`${base}Hindi`] || '').trim();
      if (english || hindi) return { hindi, english };
      const fallback = String(question[base] || '').trim();
      if (!fallback) return { hindi: '', english: '' };
      return getSavedLanguage() === 'en' ? { hindi: '', english: fallback } : { hindi: fallback, english: '' };
    }

    function buildBilingualOptions(question) {
      return ['A', 'B', 'C', 'D', 'E']
        .map((letter) => {
          const field = getBilingualField(question, `option${letter}`);
          return { letter, hindi: field.hindi, english: field.english };
        })
        .filter((opt) => opt.hindi || opt.english);
    }

    // Builds the printable HTML for a single question (question text in both
    // languages when available, optional image, and its options).
    function buildQuestionBlockHtml(question, index) {
      const qField = getBilingualField(question, 'question');
      const qHindiHtml = escapeHtml(formatQuestionText(qField.hindi)).replace(/\n/g, '<br>');
      const qEnglishHtml = escapeHtml(formatQuestionText(qField.english)).replace(/\n/g, '<br>');
      const options = buildBilingualOptions(question);

      let html = '<div class="qp-question-block">';
      html += `<div class="qp-q-number">Q${index + 1}.</div>`;
      if (qHindiHtml) html += `<div class="qp-q-text">${qHindiHtml}</div>`;
      if (qEnglishHtml) html += `<div class="qp-q-text">${qEnglishHtml}</div>`;
      if (question.imageDataUrl) {
        html += `<img class="qp-q-image" src="${question.imageDataUrl}" />`;
      }
      html += '<div class="qp-options">';
      options.forEach((opt) => {
        let text = '';
        if (opt.hindi) text += escapeHtml(opt.hindi);
        if (opt.hindi && opt.english) text += ' / ';
        if (opt.english) text += escapeHtml(opt.english);
        html += `<div class="qp-option"><b>${opt.letter}.</b><span>${text}</span></div>`;
      });
      html += '</div></div>';
      return html;
    }

        </style>
      `;

      const headerHtml = `
        <div class="qp-header">
          <div class="qp-header-brand">
            ${logoSrc ? `<img class="qp-header-logo" src="${logoSrc}" />` : ''}
            <div class="qp-header-title">MARUDHARA EXAM</div>
          </div>
          <div class="qp-header-url">www.marudharaexam.in</div>
        </div>
      `;

      const watermarkHtml = `<div class="qp-watermark">${logoSrc ? `<img src="${logoSrc}" />` : ''}</div>`;

      function footerHtml(pageNum, totalPages) {
        return `
          <div class="qp-footer">
            <div>Marudhara Exam</div>
            <div>www.marudharaexam.in</div>
            <div>Page ${pageNum} of ${totalPages}</div>
          </div>
        `;
      }

      const coverInnerHtml = `
        <div class="qp-cover-title">MARUDHARA EXAM</div>
        <div class="qp-cover-row"><strong>Exam Name</strong><span>${escapeHtml(meta.mockTitle)}</span></div>
        <div class="qp-cover-row"><strong>Category</strong><span>${escapeHtml(meta.categoryName)}</span></div>
        <div class="qp-cover-row"><strong>Total Questions</strong><span>${meta.totalQuestions}</span></div>
        <div class="qp-cover-row"><strong>Total Marks</strong><span>${meta.totalMarks}</span></div>
        <div class="qp-cover-row"><strong>Time</strong><span>${escapeHtml(meta.time)}</span></div>
        <div class="qp-cover-sep"></div>
      `;

      const questionBlockHtmls = questions.map((q, idx) => buildQuestionBlockHtml(q, idx));

      const answerKeyTitleHtml = '<div class="qp-answerkey-title">ANSWER KEY</div><div class="qp-answerkey-sep"></div>';
      const columns = 5;
      const answerRows = [];
      for (let r = 0; r < Math.ceil(questions.length / columns); r += 1) {
        let rowHtml = '<div class="qp-ak-row">';
        for (let c = 0; c < columns; c += 1) {
          const qIndex = r * columns + c;
          if (qIndex < questions.length) {
            const answerLetter = normalizeAnswer(questions[qIndex].answer || '') || '-';
            rowHtml += `<div>${qIndex + 1}-${answerLetter}</div>`;
          } else {
            rowHtml += '<div></div>';
          }
        }
        rowHtml += '</div>';
        answerRows.push(rowHtml);
      }

      // ---- Measure every block against the real rendered content width so
      // pagination matches exactly what html2pdf will later capture. ----
      const probe = document.createElement('div');
      probe.className = 'qp-root';
      probe.style.position = 'fixed';
      probe.style.left = '-99999px';
      probe.style.top = '0';
      probe.style.visibility = 'hidden';
      probe.style.width = `${CONTENT_W_MM}mm`;
      probe.innerHTML = styleBlock;
      document.body.appendChild(probe);

      const mmProbe = document.createElement('div');
      mmProbe.style.height = '100mm';
      mmProbe.style.width = '0';
      probe.appendChild(mmProbe);
      const pxPerMm = mmProbe.getBoundingClientRect().height / 100;
      probe.removeChild(mmProbe);

      function measure(html) {
        const wrap = document.createElement('div');
        wrap.innerHTML = html;
        probe.appendChild(wrap);
        const h = wrap.getBoundingClientRect().height;
        probe.removeChild(wrap);
        return h;
      }

      const contentAreaPx = CONTENT_AREA_MM * pxPerMm;
      const coverHeightPx = measure(coverInnerHtml);
      const answerTitleHeightPx = measure(answerKeyTitleHtml);
      const questionHeights = questionBlockHtmls.map(measure);
      const answerRowHeights = answerRows.map(measure);

      document.body.removeChild(probe);

      // ---- Pack measured blocks into fixed-size pages. ----
      const pages = [];

      // Page 1 is always a dedicated cover page, even if more would technically fit.
      pages.push([coverInnerHtml]);
      void coverHeightPx; // cover always gets its own page regardless of measured height

      // Question pages: pack greedily, never splitting a question awkwardly across pages.
      let current = [];
      let currentHeight = 0;
      questionBlockHtmls.forEach((html, idx) => {
        const h = questionHeights[idx];
        if (current.length && currentHeight + h > contentAreaPx) {
          pages.push(current);
          current = [];
          currentHeight = 0;
        }
        current.push(html);
        currentHeight += h;
      });
      if (current.length) pages.push(current);

      // Answer key always starts on a fresh page, then wraps to further pages if needed.
      let akCurrent = [answerKeyTitleHtml];
      let akHeight = answerTitleHeightPx;
      answerRows.forEach((html, idx) => {
        const h = answerRowHeights[idx];
        if (akHeight + h > contentAreaPx) {
          pages.push(akCurrent);
          akCurrent = [];
          akHeight = 0;
        }
        akCurrent.push(html);
        akHeight += h;
      });
      if (akCurrent.length) pages.push(akCurrent);

      const totalPages = pages.length;
      const pagesHtml = pages
        .map(
          (blocks, i) => `
        <div class="qp-page">
          ${watermarkHtml}
          ${headerHtml}
          <div class="qp-content">${blocks.join('')}</div>
          ${footerHtml(i + 1, totalPages)}
        </div>
      `
        )
        .join('');

      return styleBlock + pagesHtml;
    }

    async function generateQuestionPaperPdf() {
      const button = document.getElementById('downloadQuestionPaperBtn');
      const result = pdfPaperState.result;
      let questions = pdfPaperState.questions;

      if (!result) {
        alert('Result data is not loaded yet. Please wait for the page to finish loading.');
        return;
      }

      // Never fetch another copy if the questions are already loaded in memory.
      if (!Array.isArray(questions) || questions.length === 0) {
        try {
          questions = await fetchQuestions(result.mockId);
          pdfPaperState.questions = questions;
        } catch (error) {
          console.error('Question fetch for PDF failed:', error);
        }
      }

      if (!Array.isArray(questions) || questions.length === 0) {
        alert('No questions are available to generate the question paper.');
        return;
      }

      if (button) {
        button.disabled = true;
        button.textContent = 'Generating PDF…';
      }

      const printable = document.getElementById('printQuestionPaper');

      try {
        const totalQuestions = questions.length;
        const totalMarks = (result.positiveMarks || 1) * totalQuestions;
        const meta = {
          mockTitle: result.mockTitle || 'Mock exam',
          categoryName: pdfPaperState.categoryName || 'N/A',
          totalQuestions,
          totalMarks,
          time: formatSeconds(result.timeTakenSeconds ?? result.duration ?? result.timeRemainingSeconds)
        };

        // Load the real project logo as a data URL so it renders reliably
        // once html2canvas captures the printable document (no placeholder path).
        const logoCandidates = [
          '../images/web logo_11zon.png',
          '/images/web%20logo_11zon.png'
        ];
        let logoImageData = null;
        for (const candidate of logoCandidates) {
          logoImageData = await loadImageAsDataUrl(candidate);
          if (logoImageData) break;
        }
        const logoSrc = logoImageData ? logoImageData.dataUrl : '';

        // Preload every question image (if any) as a data URL up front, using the
        // question data already in memory — no re-fetching of questions.
        const questionsWithImages = [];
        for (let i = 0; i < questions.length; i += 1) {
          const question = questions[i];
          let imageDataUrl = '';
          if (question.image) {
            const loaded = await loadImageAsDataUrl(question.image);
            if (loaded) imageDataUrl = loaded.dataUrl;
          }
          questionsWithImages.push({ ...question, imageDataUrl });
        }

        const documentHtml = buildQuestionPaperDocument(questionsWithImages, meta, logoSrc);
        printable.className = 'qp-root';
        printable.innerHTML = documentHtml;

        // Wait for the browser to actually paint the newly-inserted DOM, and for
        // every <img> inside it (logo, watermark, question images) to finish
        // loading, before handing the element to html2pdf — otherwise html2canvas
        // can capture an empty/unpainted snapshot.
        await new Promise((resolve) => {
          requestAnimationFrame(() => {
            requestAnimationFrame(resolve);
          });
        });
        await Promise.all(
          Array.from(printable.querySelectorAll('img')).map((img) => {
            if (img.complete && img.naturalWidth > 0) return Promise.resolve();
            return new Promise((resolve) => {
              img.addEventListener('load', resolve, { once: true });
              img.addEventListener('error', resolve, { once: true });
            });
          })
        );

        const fileName = `${sanitizeFilenamePart(meta.mockTitle)}_Question_Paper.pdf`;

        await html2pdf()
          .set({
            margin: 0,
            filename: fileName,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
            pagebreak: { mode: ['css'] }
          })
          .from(printable)
          .save();
      } catch (error) {
        console.error('Question paper PDF generation failed:', error);
        alert('Unable to generate the question paper PDF. Please try again.');
      } finally {
        if (printable) printable.innerHTML = '';
        if (button) {
          button.disabled = false;
          button.textContent = 'Download Question Paper';
        }
      }
    }


    function attachDownloadQuestionPaperHandler() {
      const button = document.getElementById('downloadQuestionPaperBtn');
      if (!button || button.dataset.bound === '1') return;
      button.dataset.bound = '1';
      button.addEventListener('click', () => {
        generateQuestionPaperPdf();
      });
    }
  </script>
