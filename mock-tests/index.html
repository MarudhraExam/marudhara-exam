<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marudhara Exam | Categories</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      background: #f4f7fb;
      color: #1f324f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #f8fbff 0%, #edf2f8 100%);
    }

    body, button {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px 32px;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand .logo {
      width: 52px;
      height: 52px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: #0b4ea2;
      color: white;
      font-weight: 800;
      font-size: 1.1rem;
    }

    .brand h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .brand small {
      display: block;
      color: #5f6f8f;
      margin-top: 4px;
      font-size: 0.96rem;
    }

    .status-bar {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 46px;
      padding: 14px 18px;
      border-radius: 18px;
      background: #eef4ff;
      color: #102a52;
      font-weight: 600;
      margin-bottom: 24px;
    }

    .status-bar.error {
      background: #ffe7e6;
      color: #8a1f19;
    }

    .grid {
      display: grid;
      gap: 18px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }

    .card {
      background: white;
      border: 1px solid rgba(35, 49, 79, 0.1);
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 280px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 48px rgba(23, 42, 77, 0.08);
    }

    .hero {
    height: 260px;
    padding: 0;
    overflow: hidden;
    background: #fff;
}

.hero img {
    width: 100%;
    height: 100%;
    object-fit: contain;   /* agar poori image dikhani ho */
    /* object-fit: cover;  agar banner ki tarah fill karni ho */
    display: block;
}

.hero .fallback-icon {
    width: 100%;
    height: 100%;
    display: grid;
    place-items: center;
    font-size: 70px;
}

    .hero .fallback-icon {
      color: #0b4ea2;
      font-size: 2rem;
    }

    .card-body {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .card-body h2 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.3;
      color: #102a52;
    }

    .card-body p {
      margin: 0;
      color: #5f6f8f;
      line-height: 1.75;
      flex: 1;
      min-height: 72px;
    }

    .details {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .badge {
      background: #eef4ff;
      color: #0b4ea2;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      padding: 0 22px 22px;
    }

    .button-primary {
      border: 0;
      border-radius: 14px;
      padding: 12px 18px;
      background: #0b4ea2;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .button-primary:hover {
      background: #0f3c7f;
    }

    .empty-state {
      padding: 34px 24px;
      border-radius: 24px;
      background: white;
      border: 1px dashed rgba(35, 49, 79, 0.15);
      text-align: center;
      color: #556180;
      font-size: 1rem;
    }

   @media (max-width:768px){

  .page-shell{
      padding:12px;
  }

  header{
      flex-direction:column;
      align-items:stretch;
      gap:10px;
      margin-bottom:15px;
  }

  .brand h1{
      font-size:22px;
  }

  .brand small{
      font-size:13px;
  }

  .grid{
      grid-template-columns:repeat(2,1fr);
      gap:12px;
  }

  .card{

      border-radius:16px;
  }

  .hero{
      height:110px;
  }

  .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
  }

  .card-body{
      padding:10px;
      gap:8px;
  }

  .card-body h2{
      font-size:15px;
      line-height:1.3;
      min-height:38px;
      overflow:hidden;
  }

  /* Description hide */
  .card-body p{
      display:none;
  }

  .details{
      justify-content:center;
      gap:6px;
  }

  /* Category badge hide */
  .details .badge:first-child{
      display:none;
  }

  .badge{
      padding:5px 10px;
      font-size:11px;
  }

  .card-footer{
      padding:0 10px 10px;
  }

  .button-primary{
      width:100%;
      padding:10px;
      font-size:13px;
      border-radius:10px;
  }

}
  </style>
</head>
<body>
  <div class="page-shell">
    <header>
      <div class="brand">
        <div class="logo">M</div>
        <div>
          <h1>Marudhara Mock Categories</h1>
          <small>Find available mock exams by category and begin practice.</small>
        </div>
      </div>
      <a class="button-primary" href="../index.html">Back to main site</a>
    </header>

    <div id="statusBar" class="status-bar">Loading categories…</div>
    <section id="categoryGrid" class="grid"></section>
  </div>

  <script type="module">
    import { db } from '../firebase.js';
    import { collection, getDocs, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

    const statusBar = document.getElementById('statusBar');
    const categoryGrid = document.getElementById('categoryGrid');

    if (!db) {
      console.error('Firebase db is not initialized. Verify the import path to ../firebase.js and ensure firebase.js exports db correctly.');
    } else {
      console.log('Firebase initialized successfully for category page.');
    }

    function setStatus(message, type = 'info') {
      statusBar.textContent = message;
      statusBar.className = type === 'error' ? 'status-bar error' : 'status-bar';
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // Cloudflare Worker payment backend base URL (same Worker used by
    // confirm.html). Backend/router/Firestore are unchanged — this page
    // calls the exact same endpoints confirm.html already uses, just scoped
    // to a category instead of a specific mock.
    const PAYMENT_API_BASE = 'https://marudhara-payment-api.jmdseller2025.workers.dev';

    // Student details (name/mobile), if known. confirm.html saves these to
    // localStorage under "mockExamSession" whenever a student enters them,
    // so a returning student is recognised here across visits/tabs without
    // any login system or new UI on this page.
    function getStoredStudent() {
      try {
        const raw = localStorage.getItem('mockExamSession') || sessionStorage.getItem('mockExamSession');
        const session = raw ? JSON.parse(raw) : null;
        return {
          studentName: session && session.studentName ? String(session.studentName).trim() : '',
          studentMobile: session && session.studentMobile ? String(session.studentMobile).trim() : ''
        };
      } catch {
        return { studentName: '', studentMobile: '' };
      }
    }

    function saveStoredStudent(details) {
      const existingRaw = localStorage.getItem('mockExamSession') || sessionStorage.getItem('mockExamSession');
      let merged = {};
      try {
        merged = existingRaw ? JSON.parse(existingRaw) : {};
      } catch {
        merged = {};
      }
      merged = { ...merged, ...details };
      const payload = JSON.stringify(merged);
      sessionStorage.setItem('mockExamSession', payload);
      try {
        localStorage.setItem('mockExamSession', payload);
      } catch {
        // localStorage may be unavailable (e.g. private browsing); the
        // session still works for the current tab via sessionStorage above.
      }
    }

    function getStoredMobile() {
      return getStoredStudent().studentMobile;
    }

    // One payment unlocks the ENTIRE category (all mocks inside it), never
    // just a single mock. This checks whether the current student has
    // already purchased a given (premium) category.
    async function fetchPurchaseStatus(mobile, categoryId) {
      try {
        const res = await fetch(
          `${PAYMENT_API_BASE}/api/purchase-status?mobile=${encodeURIComponent(mobile)}&categoryId=${encodeURIComponent(categoryId)}`
        );
        if (!res.ok) return false;
        const data = await res.json();
        return !!(data && data.success === true && data.paid === true);
      } catch (error) {
        console.error('Error checking purchase status:', error);
        // Fail closed: if status can't be verified, treat as not purchased
        // so the student is never shown "View Tests" for a locked category.
        return false;
      }
    }

    async function createOrder(payload) {
      const res = await fetch(`${PAYMENT_API_BASE}/api/create-order`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        throw new Error('Unable to create payment order. Please try again.');
      }
      return res.json();
    }

    async function verifyPayment(payload) {
      const res = await fetch(`${PAYMENT_API_BASE}/api/verify-payment`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        throw new Error('Payment verification failed. Please try again.');
      }
      return res.json();
    }

    function loadRazorpayScript() {
      return new Promise((resolve, reject) => {
        if (window.Razorpay) {
          resolve();
          return;
        }
        const existing = document.querySelector('script[data-razorpay-checkout]');
        if (existing) {
          existing.addEventListener('load', () => resolve());
          existing.addEventListener('error', () => reject(new Error('Unable to load payment gateway.')));
          return;
        }
        const script = document.createElement('script');
        script.src = 'https://checkout.razorpay.com/v1/checkout.js';
        script.dataset.razorpayCheckout = 'true';
        script.onload = () => resolve();
        script.onerror = () => reject(new Error('Unable to load payment gateway.'));
        document.body.appendChild(script);
      });
    }

    // orderRes is the full response from POST /api/create-order, e.g.
    // { success: true, key: "rzp_xxx", order: { id, amount, currency } }.
    // The Razorpay key must come from the Worker response itself, never
    // hardcoded or assumed, so checkout always matches the account that
    // actually created the order.
    function openRazorpayCheckout(orderRes, category, name, mobile) {
      return new Promise((resolve, reject) => {
        const order = { id: orderRes.orderId, amount: orderRes.amount, currency: orderRes.currency };
        const razorpayKey = orderRes.keyId;

        if (!razorpayKey || !order.id || !order.amount) {
          reject(new Error('Payment order details are incomplete. Please try again.'));
          return;
        }

        const options = {
          key: razorpayKey,
          amount: order.amount,
          currency: order.currency || 'INR',
          name: 'Marudhara Exam',
          description: category.name ? `${category.name} — full category access` : 'Category access',
          order_id: order.id,
          prefill: {
            name: name,
            contact: mobile
          },
          theme: {
            color: '#0b4ea2'
          },
          modal: {
            ondismiss: function () {
              reject(new Error('Payment was cancelled.'));
            }
          },
          handler: async function (response) {
            try {
              setStatus('Verifying payment…');
              const verifyRes = await verifyPayment({
                categoryId: category.id,
                mobile: mobile,
                razorpay_order_id: response.razorpay_order_id,
                razorpay_payment_id: response.razorpay_payment_id,
                razorpay_signature: response.razorpay_signature
              });

              if (verifyRes && verifyRes.success) {
                resolve(verifyRes);
              } else {
                reject(new Error('Payment verification failed.'));
              }
            } catch (err) {
              reject(err);
            }
          }
        };

        const rzp = new window.Razorpay(options);
        rzp.on('payment.failed', function () {
          reject(new Error('Payment failed. Please try again.'));
        });
        rzp.open();
      });
    }

    // Collects name/mobile if not already known. Uses simple prompts rather
    // than new form fields so the existing page layout/CSS stays untouched.
    function ensureStudentDetails() {
      let { studentName, studentMobile } = getStoredStudent();

      if (!studentName) {
        const name = window.prompt('Enter your full name to continue with the purchase:', '');
        if (!name || !name.trim()) return null;
        studentName = name.trim();
      }

      if (!studentMobile) {
        const mobile = window.prompt('Enter your mobile number to continue with the purchase:', '');
        if (!mobile || !mobile.trim()) return null;
        studentMobile = mobile.trim();
      }

      saveStoredStudent({ studentName, studentMobile });
      return { studentName, studentMobile };
    }

    // Marks a category's card as unlocked in place (no page reload), so the
    // button becomes "View tests" immediately after a successful payment.
    function markCategoryUnlocked(category, buttonEl) {
      buttonEl.textContent = 'View tests';
      buttonEl.onclick = () => {
        window.location.href = `category.html?id=${encodeURIComponent(category.id)}`;
      };
    }

    // Starts the purchase flow for an entire category directly from the
    // category card — no intermediate navigation to category.html. Only
    // after payment is verified does the button turn into "View Tests".
    async function startCategoryPurchase(category, buttonEl) {
      if (buttonEl.dataset.processing === 'true') return;

      const details = ensureStudentDetails();
      if (!details) {
        setStatus('Name and mobile number are required to purchase this category.', 'error');
        return;
      }
      const { studentName, studentMobile } = details;

      buttonEl.dataset.processing = 'true';
      const previousLabel = buttonEl.textContent;
      buttonEl.disabled = true;
      buttonEl.textContent = 'Please wait…';

      try {
        // Guard against a purchase already completed elsewhere (e.g. another
        // tab, or an earlier payment for this mobile number).
        setStatus('Checking purchase status…');
        const alreadyPaid = await fetchPurchaseStatus(studentMobile, category.id);
        if (alreadyPaid) {
          markCategoryUnlocked(category, buttonEl);
          setStatus('Select a category to view mock tests.');
          return;
        }

        setStatus('Preparing payment…');
        await loadRazorpayScript();

        const orderRes = await createOrder({
          categoryId: category.id,
          mobile: studentMobile,
          studentName: studentName
        });
        if (!orderRes || orderRes.success !== true || !orderRes.orderId) {
          throw new Error('Unable to create payment order. Please try again.');
        }

        setStatus('Opening payment window…');
        const verifyRes = await openRazorpayCheckout(orderRes, category, studentName, studentMobile);
        if (!verifyRes || verifyRes.success !== true) {
          throw new Error('Payment verification failed. Please try again.');
        }

        // Payment verified — the whole category is now unlocked for this
        // mobile number, so the card turns into "View Tests" immediately.
        markCategoryUnlocked(category, buttonEl);
        setStatus('Payment successful. Category unlocked.');
      } catch (error) {
        console.error('Category purchase error:', error);
        setStatus(error && error.message ? error.message : 'Unable to complete purchase. Please try again.', 'error');
      } finally {
        buttonEl.dataset.processing = 'false';
        buttonEl.disabled = false;
        if (buttonEl.textContent === 'Please wait…') {
          buttonEl.textContent = previousLabel;
        }
      }
    }

    // categoryId -> category doc, so the inline button handler (which can
    // only pass an id through the HTML attribute) can look up the full
    // category object needed to create an order.
    let categoriesById = {};

    window.handleCategoryButtonClick = function (categoryId, buttonEl) {
      const category = categoriesById[categoryId];
      if (!category) return;
      const isFree = category.isFree !== false;
      if (isFree) {
        window.location.href = `category.html?id=${encodeURIComponent(categoryId)}`;
        return;
      }
      startCategoryPurchase(category, buttonEl);
    };

    function buildCard(category, paid) {
      const icon = (category.image || category.icon) ? `<img src="${escapeHtml(category.image || category.icon)}" alt="${escapeHtml(category.name)} icon" />` : '<div class="fallback-icon">📚</div>';
      const description = escapeHtml(category.description || 'Browse mock tests in this category.');
      // Category-level Premium system: access/price is a property of the
      // category, not of any individual mock inside it.
      const isFree = category.isFree !== false;
      const accessBadge = isFree
        ? '<span class="badge">Free</span>'
        : `<span class="badge">Premium ₹${escapeHtml(category.offerPrice ?? '—')}</span>`;
      // Free categories, and premium categories this student has already
      // purchased, open straight to the tests. A premium category the
      // student hasn't purchased shows a Purchase button that starts the
      // payment flow immediately — it never navigates to category.html
      // first, so premium mocks can never be reached without paying.
      const unlocked = isFree || paid === true;
      const ctaLabel = unlocked ? 'View tests' : `Purchase ₹${escapeHtml(category.offerPrice ?? '—')}`;
      return `
        <article class="card">
          <div class="hero">${icon}</div>
          <div class="card-body">
            <h2>${escapeHtml(category.name || 'Untitled category')}</h2>
            <p>${description}</p>
            <div class="details">
              <span class="badge">Category</span>
              ${accessBadge}
            </div>
          </div>
          <div class="card-footer">
            <button class="button-primary" type="button" onclick="window.handleCategoryButtonClick('${category.id}', this)">${ctaLabel}</button>
          </div>
        </article>`;
    }

    async function loadCategories() {
      try {
        setStatus('Loading categories…');
        const categoriesQuery = query(collection(db, 'mockCategories'), where('active', '==', true), orderBy('order', 'asc'));
        const snapshot = await getDocs(categoriesQuery);
        const categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

        if (!categories.length) {
          categoryGrid.innerHTML = '<div class="empty-state">No active categories are available at this time.</div>';
          setStatus('No categories available.', 'error');
          return;
        }

        categoriesById = Object.fromEntries(categories.map(category => [category.id, category]));

        // Check purchase status for every premium category before rendering,
        // so each card renders once with the correct button ("View tests"
        // vs "Purchase ₹X") instead of flipping after the fact.
        const mobile = getStoredMobile();
        const paidFlags = await Promise.all(categories.map(category => {
          const isFree = category.isFree !== false;
          if (isFree || !mobile) return Promise.resolve(false);
          return fetchPurchaseStatus(mobile, category.id);
        }));

        categoryGrid.innerHTML = categories.map((category, i) => buildCard(category, paidFlags[i])).join('');
        setStatus('Select a category to view mock tests.');
      } catch (error) {
        console.error('Error loading categories from Firestore:', error);
        categoryGrid.innerHTML = '<div class="empty-state">Unable to load categories. Please refresh the page.</div>';
        setStatus(`Failed to load categories: ${error.message || error}`, 'error');
      }
    }

    document.addEventListener('DOMContentLoaded', loadCategories);
  </script>
</body>
</html>
