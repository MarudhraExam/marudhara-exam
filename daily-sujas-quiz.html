<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Sujas Quiz</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

h1{
text-align:center;
color:#002B5B;
}

.question-box{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.option{
display:block;
width:100%;
text-align:left;
padding:12px;
margin-top:8px;
border:1px solid #ddd;
border-radius:8px;
cursor:pointer;
background:white;
}

.correct{
background:#d4edda;
border-color:#28a745;
}

.wrong{
background:#f8d7da;
border-color:#dc3545;
}

#scoreCard{
display:none;
background:white;
padding:20px;
border-radius:12px;
margin-top:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h1>📝 Daily Sujas Quiz</h1>

<div id="quizContainer">
Loading Quiz...
</div>

<div id="scoreCard"></div>

</div>
<script type="module">

import {
initializeApp
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs
uery,
orderBy
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyDHe87UG-QGyZKxh7RI8t51q0GgppVd_YA",
authDomain:"marudhara-exam.firebaseapp.com",
projectId:"marudhara-exam",
storageBucket:"marudhara-exam.firebasestorage.app",
messagingSenderId:"680152404373",
appId:"1:680152404373:web:23515d1d06c44dbd33669c"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let score = 0;
let totalQuestions = 0;

async function loadQuiz(){

const container =
document.getElementById("quizContainer");

const q = query(
collection(db,"quizzes"),
orderBy("createdAt","desc")
);

const snapshot = await getDocs(q);

let quizzes = [];

snapshot.forEach(doc=>{

quizzes.push(doc.data());

});

if(quizzes.length === 0){

container.innerHTML =
"Quiz Not Available";

return;

}

container.innerHTML = "<h2>📚 Daily Sujas Quiz Archive</h2>";

quizzes.forEach((quiz,index)=>{
container.innerHTML += `

<div class="question-box">

<h3>${quiz.quizTitle}</h3>

<p>📅 ${quiz.quizDate}</p>

<button
class="option"
onclick="openQuiz(${index})">

🚀 Start Quiz

</button>

</div>

`;

});

window.quizData = quizzes;

}

window.openQuiz = function(index){

const quiz = window.quizData[index];

score = 0;
totalQuestions = quiz.questions.length;
document.getElementById("scoreCard").style.display = "none";
document.getElementById("scoreCard").innerHTML = "";
const container =
document.getElementById("quizContainer");

container.innerHTML = `

<h2>${quiz.quizTitle}</h2>

<p>📅 ${quiz.quizDate}</p>

`;

quiz.questions.forEach((q,qIndex)=>{

const box =
document.createElement("div");

box.className = "question-box";

box.innerHTML =
`<h3 style="white-space:pre-wrap;">Q${qIndex+1}. ${q.question}</h3>`;
q.options.forEach((option,optIndex)=>{

const btn =
document.createElement("button");

btn.className = "option";

btn.innerText =
String.fromCharCode(65+optIndex)
+ ". " + option;

btn.onclick = ()=>{

if(box.dataset.answered)
return;

box.dataset.answered = "true";

const selected =
String.fromCharCode(65+optIndex);

if(selected === q.correctAnswer){

btn.classList.add("correct");

score++;

}else{

btn.classList.add("wrong");

const correctIndex =
q.correctAnswer.charCodeAt(0)-65;

box.querySelectorAll(".option")
[correctIndex]
.classList.add("correct");

}

checkResult();

};

box.appendChild(btn);

});

container.appendChild(box);

});

};
function checkResult(){

const answered =
document.querySelectorAll(
"[data-answered='true']"
).length;

if(answered === totalQuestions){

const scoreCard =
document.getElementById("scoreCard");

scoreCard.style.display =
"block";

scoreCard.innerHTML = `

<h2>🎉 Quiz Complete</h2>

<p>
Score:
${score}/${totalQuestions}
</p>

<p>
Percentage:
${((score/totalQuestions)*100).toFixed(2)}%
</p>

`;

}

}

loadQuiz();

</script>
</body>
</html>
