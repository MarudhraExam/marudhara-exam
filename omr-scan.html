<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<title>OMR Scanner</title>

<style>
body{
font-family:Arial,sans-serif;
padding:20px;
background:#f5f6fa;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

img{
max-width:100%;
border:1px solid #ddd;
}
</style>
<script async src="https://docs.opencv.org/4.x/opencv.js"></script>

</head>

<body>

<div class="container">

<h2>📷 Uploaded OMR</h2>

<img id="omrPreview">

<br><br>

<button onclick="scanOMR()">
🔍 OMR Scan करें
</button>

<div id="resultBox"
style="
margin-top:20px;
padding:15px;
border:1px solid #ddd;
display:none;
">
</div>

</div>

<script>

const image =
localStorage.getItem("omrImage");

document.getElementById(
"omrPreview"
).src = image;

window.scanOMR = function(){

alert("Scan Button Working");

const resultBox =
document.getElementById("resultBox");

resultBox.style.display = "block";

resultBox.innerHTML =
"Test Success";

};

resultBox.innerHTML =
"✅ OpenCV Loaded Successfully<br><br>" +

"अब अगला चरण Bubble Detection होगा।";

}

</script>
</body>
</html>
