<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Marudhara Exam Result Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Marudhara Exam Result Portal</h1>
        <nav>
            <a href="index.html">Student Search Portal</a>
            <a href="admin.html" class="active">Admin Dashboard</a>
        </nav>
    </header>

    <div class="container">
        <main>
            <div class="card">
                <h2 id="form-action-title">Import New Exam Result</h2>
                <form id="exam-form">
                    <input type="hidden" id="exam-id">
                    <div class="form-group">
                        <label for="exam-name">Exam Name</label>
                        <input type="text" id="exam-name" required placeholder="e.g., Rajasthan Patwari 2024">
                    </div>
                    <div class="form-group">
                        <label for="excel-file">Choose Excel File (.xlsx, .xls, .csv)</label>
                        <input type="file" id="excel-file" accept=".xlsx, .xls, .csv" required>
                    </div>
                    <button type="submit" id="submit-btn" class="btn btn-primary">Import Excel Result</button>
                    <button type="button" id="cancel-btn" class="btn" style="display:none;">Cancel Edit</button>
                </form>
                <div id="progress-wrapper" class="progress-wrapper">
                    <label id="progress-label">Import Progress:</label>
                    <div style="display: flex; align-items: center;">
                        <div class="progress-bar">
                            <div class="progress-fill" id="progress-fill"></div>
                        </div>
                        <span id="progress-percent">0%</span>
                    </div>
                    <p id="progress-log">Starting import...</p>
                </div>
            </div>

            <div class="card">
                <h2>Manage Examinations</h2>
                <div class="table-responsive">
                    <table id="exams-table">
                        <thead>
                            <tr>
                                <th>Exam Name</th>
                                <th>File Name</th>
                                <th>Created Date</th>
                                <th>Students Count</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="exams-list">
                            <!-- Exam rows will be inserted here dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Replace Excel Modal -->
    <div id="replace-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Replace Excel File</h2>
                <span id="close-replace-modal" class="close">&times;</span>
            </div>
            <form id="replace-form">
                <input type="hidden" id="replace-exam-id">
                <div class="form-group">
                    <label for="replace-excel-file">New Excel File</label>
                    <input type="file" id="replace-excel-file" accept=".xlsx, .xls, .csv" required>
                </div>
                <button type="submit" class="btn btn-primary">Replace</button>
            </form>
            <div id="replace-progress-wrapper" class="progress-wrapper">
                <label id="replace-progress-label">Replace Progress:</label>
                 <div style="display: flex; align-items: center;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="replace-progress-fill"></div>
                    </div>
                    <span id="replace-progress-percent">0%</span>
                </div>
                <p id="replace-progress-log">Starting replacement...</p>
            </div>
        </div>
    </div>

    <footer>
        <p>Marudhara Exam</p>
        <a href="http://www.marudharaexam.in" target="_blank">www.marudharaexam.in</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="import.js"></script>
</body>
</html>
