<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard V2</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{
text-align:center;
color:#002B5B;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
text-align:center;
cursor:pointer;
font-size:20px;
font-weight:bold;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card:hover{
transform:translateY(-3px);
}

.section{
display:none;
margin-top:30px;
background:white;
padding:20px;
border-radius:15px;
}
label{
display:block;
margin-top:15px;
font-weight:bold;
}

input,
textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
margin-top:15px;
background:#002B5B;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<script>

const password = prompt("Admin Password Enter करें");

if(password !== "Marudhara@2026"){

alert("Wrong Password");

window.location.href="index.html";

}

</script>

<div class="container">

<h1>⚙️ मरुधरा एग्जाम Admin Dashboard</h1>

<div class="dashboard">

<div class="card" onclick="showSection('answerSection')">
📋 Answer Keys
</div>

<div class="card" onclick="showSection('vacancySection')">
📢 Vacancies
</div>

<div class="card" onclick="showSection('dailySection')">
📘 Daily Suja Sar
</div>

<div class="card" onclick="showSection('downloadSection')">
📥 Downloads
</div>

<div class="card" onclick="showSection('resultSection')">
📊 Results
</div>

</div>

<div id="answerSection" class="section">

<h2>📋 Answer Key Manager</h2>

<label>Exam Name</label>
<input type="text" id="examName">

<label>Paper Code</label>
<input type="text" id="paperCode">

<label>Exam Date</label>
<input type="date" id="examDate">

<label>Total Questions</label>
<input type="number" id="totalQuestions">

<label>Correct Marks</label>
<input type="number" id="correctMarks" value="2">

<label>Negative Marks</label>
<input type="number" id="negativeMarks" value="0.33" step="0.01">

<label>Pass Percentage</label>
<input type="number" id="passPercentage" value="40">

<label>Deleted Questions</label>
<input type="text" id="deletedQuestions">

<label>Answer Key</label>
<textarea id="answerKey" rows="8"></textarea>

<button onclick="saveExam()">
Save Exam
</button>

<div id="examList">
Loading Exams...
</div>

</div>
<div id="vacancySection" class="section">
<h2>📢 Vacancy Manager</h2>
</div>

<div id="dailySection" class="section">
<h2>📘 Daily Suja Sar Manager</h2>
</div>

<div id="downloadSection" class="section">
<h2>📥 Downloads Manager</h2>
</div>

<div id="resultSection" class="section">
<h2>📊 Results Manager</h2>
</div>

</div>

<script>

function showSection(id){

document
.querySelectorAll(".section")
.forEach(section=>{

section.style.display="none";

});

document
.getElementById(id)
.style.display="block";

}

</script>

</body>
</html>
