<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Notes | मरुधरा एग्जाम</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:15px;
}
h1{
text-align:center;
font-size:32px;
}

.card-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,180px));
gap:20px;
justify-content:center;
}

.card{
background:#fff;
border-radius:15px;
padding:15px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.card img{
width:80px;
height:80px;
object-fit:contain;
margin:auto;
display:block;
}

.back-btn{
padding:10px 15px;
margin-bottom:20px;
cursor:pointer;
}

.pdf-box{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.open-btn{
display:inline-block;
padding:8px 15px;
background:#003366;
color:white;
text-decoration:none;
border-radius:6px;
}
</style>
</head>
<body>

<h1>📚 Important Notes</h1>
<div id="notesContainer"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
 apiKey:"....",
 authDomain:"....",
 projectId:"marudhara-exam",
 storageBucket:"....",
 messagingSenderId:"....",
 appId:"...."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let categories = {};
let subjects = {};

window.loadNotes = async function(){

categories = {};
subjects = {};

const categoriesSnap = await getDocs(collection(db,"notesCategories"));
const subjectsSnap = await getDocs(collection(db,"notesSubjects"));

categoriesSnap.forEach(doc=>{
 categories[doc.id] = doc.data();
});

subjectsSnap.forEach(doc=>{
 subjects[doc.id] = doc.data();
});

let html = '<div class="card-grid">';

for(const categoryId in categories){

const category = categories[categoryId];

html += `
<div class="card" onclick="showSubjects('${categoryId}')">
<img src="${category.icon || ''}">
<h3>${category.name}</h3>
<p>Click Here</p>
</div>
`;
}

html += '</div>';

document.getElementById("notesContainer").innerHTML = html;
}

window.showSubjects = async function(categoryId){

let html = `
<button class="back-btn" onclick="loadNotes()">⬅ Back</button>
<div class="card-grid">
`;

for(const subjectId in subjects){

const subject = subjects[subjectId];

if(subject.categoryId !== categoryId) continue;

html += `
<div class="card" onclick="showPdfs('${subjectId}')">
<img src="${subject.icon || ''}">
<h3>${subject.subjectName}</h3>
<p>Click Here</p>
</div>
`;
}

html += '</div>';

document.getElementById("notesContainer").innerHTML = html;
}

window.showPdfs = async function(subjectId){

const topicsSnap = await getDocs(collection(db,"notesTopics"));
const pdfsSnap = await getDocs(collection(db,"notesPdfs"));

let html = `
<button class="back-btn" onclick="loadNotes()">🏠 Home</button>
<h2>PDF Notes</h2>
`;

const topics = topicsSnap.docs.sort((a,b)=>{
    const n1 = parseInt(a.data().topicName.match(/\d+/)?.[0] || 0);
    const n2 = parseInt(b.data().topicName.match(/\d+/)?.[0] || 0);
    return n1 - n2;
});

topics.forEach(topicDoc=>{

const topic = topicDoc.data();

if(topic.subjectId !== subjectId) return;

html += `<div class="pdf-box"><h3>${topic.topicName}</h3>`;

pdfsSnap.forEach(pdfDoc=>{

const pdf = pdfDoc.data();

if(pdf.topicId !== topicDoc.id) return;

html += `
<p><b>${pdf.noteTitle}</b></p>
<a href="${pdf.pdfLink}" target="_blank" class="open-btn">Open PDF</a>
<hr>
`;

});

html += `</div>`;

});

document.getElementById("notesContainer").innerHTML = html;
}

loadNotes();

</script>
</body>
</html>
