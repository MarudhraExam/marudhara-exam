<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Notes | मरुधरा एग्जाम</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:15px;
margin:0;
}

h1{
text-align:center;
font-size:48px;
margin:20px 0 30px;
}

.subject-grid{
display:block;
max-width:800px;
margin:auto;
}

.subject-card{
background:#fff;
padding:12px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
cursor:pointer;
margin-bottom:10px;
}

.subject-inner{
border:2px solid #222;
border-radius:20px;
height:120px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.subject-title{
font-size:26px;
font-weight:bold;
}

.subject-icon{
font-size:40px;
margin:15px 0;
}

.subject-hindi{
font-size:18px;
font-weight:bold;
}

.topic-box{
background:#fff;
padding:12px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.open-btn{
display:inline-block;
padding:8px 15px;
background:#003366;
color:#fff;
text-decoration:none;
border-radius:6px;
}

.hidden{
display:none;
}
.folder{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
cursor:pointer;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.folder-content{
margin-left:20px;
}

.subject-folder{
background:#eef5ff;
}

.topic-folder{
background:#f5f5f5;
}

.pdf-box{
background:white;
padding:10px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}
.card-grid{
display:flex;
flex-wrap:wrap;
gap:20px;
justify-content:center;
align-items:flex-start;
}
.card{
width:180px;
background:#fff;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
.card:hover{
transform:translateY(-3px);
}

.card-icon{
width:60px;
height:60px;
object-fit:contain;
margin:10px auto;
display:block;
}

.back-btn{
padding:10px 20px;
margin-bottom:20px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>📚 Important Notes</h1>

<div id="notesContainer"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "....",
  authDomain: "....",
  projectId: "marudhara-exam",
  storageBucket: "....",
  messagingSenderId: "....",
  appId: "...."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
window.toggleFolder = function(id){
document.getElementById(id)
.classList.toggle("hidden");
}
let categories = {};
let subjects = {};
let topics = {};
async function loadNotes(){

const categoriesSnap = await getDocs(collection(db,"notesCategories"));
const subjectsSnap = await getDocs(collection(db,"notesSubjects"));
const topicsSnap = await getDocs(collection(db,"notesTopics"));
const pdfsSnap = await getDocs(collection(db,"notesPdfs"));


categoriesSnap.forEach(doc=>{
    categories[doc.id] = doc.data();
});

subjectsSnap.forEach(doc=>{
    subjects[doc.id] = doc.data();
});

topicsSnap.forEach(doc=>{
    topics[doc.id] = doc.data();
});

let html = `<div class="card-grid">`;

for(const categoryId in categories){

const category = categories[categoryId];

html += `
<div class="card"
onclick="showSubjects('${categoryId}')">

<img src="${category.icon || 'https://cdn-icons-png.flaticon.com/512/2232/2232688.png'}"
class="card-icon">

<div style="font-weight:bold;margin-top:10px;">
${category.name}
</div>

<div style="margin-top:8px;">
Click Here
</div>
`;

}
html += `</div>`;
document.getElementById("notesContainer").innerHTML = html;

}
window.showSubjects = function(categoryId){

let html = `
<button class="back-btn"
onclick="loadNotes()">
⬅ Back
</button>

<div class="card-grid">
`;

for(const subjectId in subjects){

const subject = subjects[subjectId];

if(subject.categoryId !== categoryId) continue;

html += `
<div class="card">

<img src="${subject.icon || 'https://cdn-icons-png.flaticon.com/512/3145/3145765.png'}"
class="card-icon">

<h3>${subject.subjectName}</h3>

<p>Click Here</p>

</div>
`;

}

html += `</div>`;

document.getElementById("notesContainer").innerHTML = html;

}
loadNotes();

</script>
</body>
</html>
