<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel - मरुधरा एग्जाम</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f6fa;
    padding:30px;
}


.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

h1{
    text-align:center;
    color:#002B5B;
    margin-bottom:25px;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background:#FF8C00;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-size:18px;
}

button:hover{
    opacity:.9;
}

.info{
    background:#eef4ff;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>⚙️ मरुधरा एग्जाम Admin Panel</h1>

<div class="info">

<b>Format Example</b>

<br><br>

Exam Name :
RSSB 3rd Grade

<br>

Paper Code :
A

<br>

Deleted Questions :
5,12,27

<br>

Answer Key :

<br>

A,B,C,D,E,A,B,C,D,E

</div>

<label>Exam Name</label>
<input type="text" id="examName">

<label>Paper Code</label>
<input type="text" id="paperCode">

<label>Exam Date</label>
<input type="date" id="examDate">

<label>Total Questions</label>
<input type="number" id="totalQuestions">

<label>Correct Marks</label>
<input type="number"
id="correctMarks"
value="2">

<label>Negative Marks</label>
<input type="number"
id="negativeMarks"
value="0.33"
step="0.01">

<label>Pass Percentage</label>
<input type="number"
id="passPercentage"
value="40">

<label>Deleted Questions</label>

<input
type="text"
id="deletedQuestions"
placeholder="5,12,27">

<label>Answer Key</label>

<textarea
id="answerKey"
rows="8"
placeholder="A,B,C,D,E,A,B,C,D,E">
</textarea>

<button onclick="saveExam()">

Save Exam

</button>
<hr>

<h2>📢 Vacancy Management</h2>

<label>Vacancy Name</label>
<input type="text" id="vacancyName">

<label>Vacancy Date</label>
<input type="date" id="vacancyDate">

<label>Vacancy Details</label>
<textarea id="vacancyDetails" rows="8"></textarea>

<label>PDF Link</label>
<input type="text" id="pdfLink">

<label>Apply Link</label>
<input type="text" id="applyLink">

<label>Official Website</label>
<input type="text" id="officialLink">

<button onclick="saveVacancy()">
Publish Vacancy
</button>

<hr>

<h2>📋 Vacancy List</h2>

<div id="vacancyListAdmin">
Loading...
</div>

<hr>

<h2>📚 Saved Exams</h2>

<div id="examList">
Loading Exams...
</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc,
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

import { guardAdmin } from "./admin-auth.js";

const firebaseConfig = {

apiKey:
"AIzaSyDHe87UG-QGy2Kxh7RI8t51qOGgppVd_YA",

authDomain:
"marudhara-exam.firebaseapp.com",

projectId:
"marudhara-exam",

storageBucket:
"marudhara-exam.firebasestorage.app",

messagingSenderId:
"680152404373",

appId:
"1:680152404373:web:32f4dcb9e16c525d33669c",
measurementId: "G-8PVKGVQ74F"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

// Blocks all page interaction until a signed-in, allow-listed admin
// account is present. Real enforcement happens in firestore.rules.
await guardAdmin(app);

async function loadExams(){

const examList =
document.getElementById("examList");

if(!examList) return;

examList.innerHTML = "";

const snapshot =
await getDocs(collection(db,"exams"));

snapshot.forEach((exam)=>{

const data = exam.data();

examList.innerHTML += `

<div style="
border:1px solid #ddd;
padding:12px;
margin-bottom:10px;
border-radius:8px;
">

<b>${data.examName}</b>
(${data.paperCode})

<br><br>

<button
onclick="deleteExam('${exam.id}')"
style="
background:red;
width:auto;
padding:10px 15px;
">
🗑 Delete
</button>

</div>

`;

});

}

window.deleteExam = async function(id){

const confirmDelete =
confirm("क्या आप यह Exam Delete करना चाहते हैं?");

if(!confirmDelete) return;

await deleteDoc(
doc(db,"exams",id)
);

alert("Exam Deleted ✅");
loadExams();

};
async function loadVacanciesAdmin(){
const list =
document.getElementById("vacancyListAdmin");

if(!list) return;

list.innerHTML = "";

const snapshot =
await getDocs(collection(db,"vacancies"));

const vacancies = [];

snapshot.forEach((v)=>{

vacancies.push({
id:v.id,
...v.data()
});

});

vacancies.sort((a,b)=>
new Date(b.createdAt) -
new Date(a.createdAt)
);

vacancies.forEach((v)=>{

list.innerHTML += `

<div style="
border:1px solid #ddd;
padding:12px;
margin-bottom:10px;
border-radius:8px;
">

<b>${v.vacancyName}</b>

<br>

📅 ${v.vacancyDate || "-"}

<br><br>

<button
onclick="deleteVacancy('${v.id}')"
style="
background:red;
width:auto;
padding:10px 15px;
">
🗑 Delete
</button>

</div>

`;

});

}

window.deleteVacancy =
async function(id){

if(!confirm(
"क्या Vacancy Delete करनी है?"
))
return;

await deleteDoc(
doc(db,"vacancies",id)
);

alert("Vacancy Deleted ✅");
console.log("Before Vacancy Load");
loadVacanciesAdmin();

};

window.saveVacancy =
async function(){

try{

const vacancyName =
document.getElementById("vacancyName").value;

const vacancyDate =
document.getElementById("vacancyDate").value;

const vacancyDetails =
document.getElementById("vacancyDetails").value;

const pdfLink =
document.getElementById("pdfLink").value;

const applyLink =
document.getElementById("applyLink").value;

const officialLink =
document.getElementById("officialLink").value;

if(
vacancyName === "" ||
vacancyDetails === ""
){

alert(
"Vacancy Name और Details भरें"
);

return;

}

await addDoc(
collection(db,"vacancies"),
{
vacancyName,
vacancyDate,
vacancyDetails,
pdfLink,
applyLink,
officialLink,
createdAt:
new Date().toISOString()
}
);

alert("Vacancy Published ✅");

loadVacanciesAdmin();

document.getElementById(
"vacancyName"
).value = "";

document.getElementById(
"vacancyDate"
).value = "";

document.getElementById(
"vacancyDetails"
).value = "";

document.getElementById(
"pdfLink"
).value = "";

document.getElementById(
"applyLink"
).value = "";

document.getElementById(
"officialLink"
).value = "";

}
catch(error){

alert(
"Error : " + error.message
);

}

};
console.log("Before Vacancy Load");
loadVacanciesAdmin();

window.saveExam = async function(){
loadVacanciesAdmin();


window.saveExam = async function(){



try{

const examName =
document.getElementById("examName").value;

const paperCode =
document.getElementById("paperCode").value;

const examDate =
document.getElementById("examDate").value;

const totalQuestions =
Number(
document.getElementById("totalQuestions").value
);

const correctMarks =
Number(
document.getElementById("correctMarks").value
);

const negativeMarks =
Number(
document.getElementById("negativeMarks").value
);

const passPercentage =
Number(
document.getElementById("passPercentage").value
);

const deletedQuestions =
document.getElementById("deletedQuestions").value;

const answerKey =
document.getElementById("answerKey").value;

if(
examName === "" ||
paperCode === "" ||
totalQuestions <= 0 ||
answerKey === ""
){

alert(
"सभी आवश्यक जानकारी भरें"
);

return;

}

const examData = {

examName,
paperCode,
examDate,

totalQuestions,

correctMarks,

negativeMarks,

passPercentage,

deletedQuestions,

answerKey,

createdAt:
new Date().toISOString()

};

await addDoc(
collection(db,"exams"),
examData
);

alert(
"Exam Saved To Firebase ✅"
);
loadExams();
document.getElementById(
"examName"
).value = "";

document.getElementById(
"paperCode"
).value = "";

document.getElementById(
"examDate"
).value = "";

document.getElementById(
"totalQuestions"
).value = "";

document.getElementById(
"deletedQuestions"
).value = "";

document.getElementById(
"answerKey"
).value = "";

}
catch(error){

alert(
"Error : " + error.message
);

}

};

};

console.log("Before Exam Load");
loadExams();
</script>

</body>

</html>
