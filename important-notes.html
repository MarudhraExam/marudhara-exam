<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Important Notes | मरुधरा एग्जाम</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f5f5;
padding:20px;
}

.note-card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.note-card h3{
margin:0 0 10px;
}

.open-btn{
display:inline-block;
padding:8px 15px;
background:#003366;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>
</head>

<body>

<h1>📚 Important Notes</h1>

<div id="notesContainer"></div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "....",
  authDomain: "....",
  projectId: "marudhara-exam",
  storageBucket: "....",
  messagingSenderId: "....",
  appId: "...."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


async function loadNotes(){

async function loadNotes(){

const snapshot = await getDocs(
collection(db,"notesPdfs")
);

let grouped = {};

snapshot.forEach(doc=>{

const note = doc.data();

if(!grouped[note.topicName]){
grouped[note.topicName] = [];
}

grouped[note.topicName].push(note);

});

let html = "";

for(const topicName in grouped){

html += `
<div class="note-card">

<h2>📌 ${topicName}</h2>
`;

grouped[topicName].forEach(note=>{

html += `
<div style="margin:10px 0;padding:10px;border:1px solid #ddd;border-radius:8px;">

<h3>📄 ${note.noteTitle}</h3>

<a
href="${note.pdfLink}"
target="_blank"
class="open-btn">
Open PDF
</a>

</div>
`;

});

html += `</div>`;

}

document.getElementById(
"notesContainer"
).innerHTML = html;

}

</script>
</body>
</html>
